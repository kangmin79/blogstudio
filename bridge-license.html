<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>브릿지 라이선스 관리</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Malgun Gothic", sans-serif; background:#0f172a; color:#e2e8f0; margin:0; padding:24px; }
  .wrap { max-width: 920px; margin:0 auto; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:#94a3b8; font-size:13px; margin-bottom:20px; }
  .card { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:18px; margin-bottom:18px; }
  .card h2 { font-size:15px; margin:0 0 12px; color:#f8fafc; }
  label { display:block; font-size:13px; color:#94a3b8; margin:10px 0 4px; }
  input[type=text], input[type=password], input[type=date], input[type=tel], input[type=number] { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:#e2e8f0; font-size:14px; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
  button { cursor:pointer; border:none; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:600; color:#fff; background:#6366f1; }
  button:hover { opacity:.9; }
  button.ghost { background:#334155; }
  button.danger { background:#dc2626; }
  button.warn { background:#d97706; }
  button.restore { background:#16a34a; }
  button.sm { padding:6px 10px; font-size:12px; }
  .row { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
  .row > div { flex:1; min-width:180px; }
  .newkey { margin-top:14px; padding:14px; background:#052e16; border:1px solid #16a34a; border-radius:8px; display:none; }
  .newkey code { font-size:22px; font-weight:700; letter-spacing:1px; color:#4ade80; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #334155; white-space:nowrap; }
  th { color:#94a3b8; font-weight:600; }
  .badge { padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; }
  .b-active { background:#052e16; color:#4ade80; }
  .b-unused { background:#1e293b; color:#94a3b8; border:1px solid #475569; }
  .b-revoked { background:#450a0a; color:#f87171; }
  .msg { font-size:13px; margin-top:8px; min-height:18px; }
  .err { color:#f87171; }
  .ok { color:#4ade80; }
  .tablewrap { overflow-x:auto; }
  .muted { color:#64748b; }
</style>
</head>
<body>
<div class="wrap">
  <h1>브릿지 라이선스 관리</h1>
  <div class="sub">키 발급 · 목록 · 폐기(환불). 폰 이전이 필요하면 새 키를 재발급하세요.</div>

  <div class="card" id="authCard">
    <h2>🔑 관리자 로그인</h2>
    <div id="loginBox">
      <div class="row">
        <div>
          <label>관리자 비밀번호</label>
          <input type="password" id="adminToken" placeholder="비밀번호 입력 후 로그인" autocomplete="off" onkeydown="if(event.key==='Enter')login()">
        </div>
        <button onclick="login()">로그인</button>
      </div>
      <div class="msg muted">🔒 저장하지 않습니다. 페이지를 열 때마다 로그인하세요.</div>
      <div class="msg" id="loginMsg"></div>
    </div>
    <div id="loggedInBox" style="display:none">
      <div class="row" style="align-items:center">
        <div style="flex:1"><span class="badge b-active" style="font-size:14px;padding:5px 12px">✅ 로그인됨</span></div>
        <button class="ghost" onclick="logout()">로그아웃</button>
      </div>
    </div>
  </div>

  <div id="adminArea" style="display:none">
  <div class="card">
    <h2>➕ 새 키 발급</h2>
    <div class="row">
      <div style="flex:1 1 220px">
        <label>받는 분 전화번호 (필수 · 손님 구분 키)</label>
        <input type="tel" id="phone" placeholder="예: 010-1234-5678" autocomplete="off">
      </div>
      <div style="flex:1 1 160px">
        <label>메모 (선택 · 이름 등)</label>
        <input type="text" id="memo" placeholder="예: 홍길동" autocomplete="off">
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <div style="flex:0 0 90px">
        <label>개수</label>
        <input type="number" id="count" value="1" min="1" max="20">
      </div>
      <div style="flex:0 0 200px">
        <label>사용 가능 마지막 날짜 (비우면 영구)</label>
        <input type="date" id="expiry">
      </div>
      <button onclick="issueKey()">키 발급</button>
    </div>
    <div class="newkey" id="newkeyBox">
      <div style="margin-bottom:8px;font-size:13px;color:#94a3b8">발급된 키 (손님에게 전달 · 활성화 시 손님 폰에 바인딩)</div>
      <code id="newkeyVal"></code>
      <button class="ghost sm" style="margin-left:10px" onclick="copyKey()">전체 복사</button>
    </div>
    <div class="msg" id="issueMsg"></div>
  </div>

  <div class="card">
    <h2>📋 발급 목록 <button class="ghost sm" style="margin-left:8px" onclick="loadList()">새로고침</button></h2>
    <input type="text" id="searchBox" placeholder="🔍 전화번호·키·메모로 검색 (같은 손님끼리 묶여서 보임)" oninput="renderRows()" autocomplete="off" style="margin-bottom:12px">
    <div class="tablewrap">
      <table>
        <thead><tr>
          <th>키</th><th>전화번호</th><th>메모</th><th>상태</th><th>기기</th><th>만료</th><th>마지막 확인</th><th>작업</th>
        </tr></thead>
        <tbody id="listBody"><tr><td colspan="8" class="muted">새로고침을 눌러 불러오세요.</td></tr></tbody>
      </table>
    </div>
    <div class="msg" id="listMsg"></div>
  </div>
  </div><!-- /adminArea -->
</div>

<script>
  const FN = "https://wfmdfvkuqgxjyabphfrm.supabase.co/functions/v1/admin-licenses";
  // 게이트웨이 통과용 공개키(Publishable). 공개용이라 여기 있어도 안전.
  const APIKEY = "sb_publishable_tYcexAE3U5jcj07Qe0R8kA_9PxoIJGj";

  let allRows = [];    // 마지막으로 불러온 전체 목록(검색 필터용)
  let lastIssued = []; // 방금 발급한 키들(전체 복사용)
  let authToken = null; // 로그인 세션 동안만 메모리에 유지(저장 안 함 · 새로고침/로그아웃 시 사라짐)

  function token() { return authToken; }

  async function login() {
    const pw = document.getElementById('adminToken').value.trim();
    if (!pw) { setMsg('loginMsg', '비밀번호를 입력하세요.', 'err'); return; }
    setMsg('loginMsg', '확인 중...', '');
    authToken = pw;
    try {
      await call('ping', {});          // 비번 검증
      document.getElementById('adminToken').value = '';
      setMsg('loginMsg', '', '');
      setLoggedIn(true);
      loadList();
    } catch (e) {
      authToken = null;
      setMsg('loginMsg', e.message, 'err');
    }
  }

  function logout() {
    authToken = null;
    allRows = [];
    lastIssued = [];
    document.getElementById('newkeyBox').style.display = 'none';
    document.getElementById('listBody').innerHTML =
      '<tr><td colspan="8" class="muted">로그인하면 목록이 보입니다.</td></tr>';
    setMsg('listMsg', '', '');
    setMsg('issueMsg', '', '');
    setLoggedIn(false);
  }

  function setLoggedIn(v) {
    document.getElementById('loginBox').style.display = v ? 'none' : 'block';
    document.getElementById('loggedInBox').style.display = v ? 'block' : 'none';
    document.getElementById('adminArea').style.display = v ? 'block' : 'none';
  }

  function normPhone(s) { return (s || '').replace(/\D/g, ''); }
  function fmtPhone(s) {
    const d = normPhone(s);
    if (d.length === 11) return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
    if (d.length === 10) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
    return s || '';
  }

  async function call(action, extra) {
    const t = token();
    if (!t) throw new Error('관리자 비밀번호를 먼저 입력하세요.');
    const res = await fetch(FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': APIKEY, 'Authorization': 'Bearer ' + APIKEY },
      body: JSON.stringify(Object.assign({ admin_token: t, action }, extra || {}))
    });
    const data = await res.json().catch(() => ({}));
    if (!data.ok) {
      if (data.reason === 'unauthorized') throw new Error('비밀번호가 틀렸습니다.');
      if (data.reason === 'server_misconfigured') throw new Error('서버에 ADMIN_TOKEN 이 설정되지 않았습니다.');
      throw new Error(data.reason || ('오류(HTTP ' + res.status + ')'));
    }
    return data;
  }

  async function issueKey() {
    const phone = normPhone(document.getElementById('phone').value);
    if (!phone) { setMsg('issueMsg', '받는 분 전화번호를 입력하세요.', 'err'); return; }
    const memo = document.getElementById('memo').value.trim();
    const count = Math.max(1, Math.min(20, parseInt(document.getElementById('count').value, 10) || 1));
    const dateStr = document.getElementById('expiry').value;
    const expires_at = dateStr ? new Date(dateStr + 'T23:59:59').toISOString() : undefined; // 그날 끝까지 유효

    setMsg('issueMsg', count + '개 발급 중...', '');
    lastIssued = [];
    try {
      for (let i = 0; i < count; i++) {
        const extra = { phone: phone, order_ref: memo };
        if (expires_at) extra.expires_at = expires_at;
        const data = await call('issue', extra);
        lastIssued.push(data.license_key);
      }
      document.getElementById('newkeyVal').innerHTML = lastIssued.join('<br>');
      document.getElementById('newkeyBox').style.display = 'block';
      setMsg('issueMsg', lastIssued.length + '개 발급 완료', 'ok');
      loadList();
    } catch (e) {
      // 일부라도 발급됐으면 보여준다
      if (lastIssued.length) {
        document.getElementById('newkeyVal').innerHTML = lastIssued.join('<br>');
        document.getElementById('newkeyBox').style.display = 'block';
      }
      setMsg('issueMsg', e.message + (lastIssued.length ? ' (' + lastIssued.length + '개는 발급됨)' : ''), 'err');
      loadList();
    }
  }

  function copyKey() {
    if (!lastIssued.length) return;
    navigator.clipboard.writeText(lastIssued.join('\n'))
      .then(() => setMsg('issueMsg', '복사됨 (' + lastIssued.length + '개)', 'ok'));
  }

  function fmtDate(s) {
    if (!s) return '<span class="muted">-</span>';
    const d = new Date(s);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function badge(status) {
    const map = { active:'활성', unused:'미사용', revoked:'폐기' };
    return '<span class="badge b-' + status + '">' + (map[status]||status) + '</span>';
  }
  function fmtExpiry(s) {
    if (!s) return '<span class="muted">영구</span>';
    const days = Math.ceil((new Date(s).getTime() - Date.now()) / 86400000);
    if (days < 0) return '<span style="color:#f87171">만료됨</span>';
    if (days <= 7) return fmtDate(s) + ' <span style="color:#fbbf24">(D-' + days + ')</span>';
    return fmtDate(s);
  }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  async function loadList() {
    setMsg('listMsg', '불러오는 중...', '');
    try {
      const data = await call('list', {});
      allRows = data.rows || [];
      // 같은 전화번호(손님)끼리 묶고, 그 안은 최신 발급순
      allRows.sort((a, b) => {
        const pa = normPhone(a.phone), pb = normPhone(b.phone);
        if (pa !== pb) return pa < pb ? -1 : 1;
        return (b.created_at || '').localeCompare(a.created_at || '');
      });
      renderRows();
    } catch (e) { setMsg('listMsg', e.message, 'err'); }
  }

  // 검색어로 거른 뒤 표를 그린다(전화번호 숫자 / 키 / 메모 매칭).
  function renderRows() {
    const raw = document.getElementById('searchBox').value.trim();
    const qDigit = normPhone(raw);
    const qLower = raw.toLowerCase();
    let rows = allRows;
    if (raw) {
      rows = allRows.filter(r =>
        (qDigit && normPhone(r.phone).includes(qDigit)) ||
        (r.license_key || '').toLowerCase().includes(qLower) ||
        (r.order_ref || '').toLowerCase().includes(qLower)
      );
    }
    const body = document.getElementById('listBody');
    if (!rows.length) {
      body.innerHTML = '<tr><td colspan="8" class="muted">' +
        (allRows.length ? '검색 결과가 없습니다.' : '아직 발급된 키가 없습니다.') + '</td></tr>';
      setMsg('listMsg', '', 'muted');
      return;
    }
    body.innerHTML = rows.map(r => {
      const dev = r.device_id ? '<span class="ok">등록됨</span>' : '<span class="muted">미등록</span>';
      const key = esc(r.license_key);
      return '<tr>' +
        '<td><code>' + key + '</code></td>' +
        '<td>' + esc(fmtPhone(r.phone)) + '</td>' +
        '<td>' + esc(r.order_ref || '') + '</td>' +
        '<td>' + badge(r.status) + '</td>' +
        '<td>' + dev + '</td>' +
        '<td>' + fmtExpiry(r.expires_at) + '</td>' +
        '<td>' + fmtDate(r.last_verified_at) + '</td>' +
        '<td>' +
          (r.status === 'revoked'
            ? '<button class="restore sm" onclick="restoreKey(\'' + key + '\')">되살리기</button> '
            : '<button class="danger sm" onclick="revokeKey(\'' + key + '\')">폐기</button> ') +
          '<button class="ghost sm" onclick="deleteKey(\'' + key + '\')">삭제</button>' +
        '</td>' +
      '</tr>';
    }).join('');
    const phones = new Set(rows.map(r => normPhone(r.phone)).filter(Boolean));
    setMsg('listMsg', rows.length + '건 · 손님 ' + phones.size + '명', 'muted');
  }

  // 행 작업 공통 처리(확인창 → 서버 호출 → 목록 갱신). 현재는 폐기에 사용.
  async function rowAction(action, key, confirmMsg) {
    if (!confirm(confirmMsg)) return;
    try { await call(action, { license_key: key }); loadList(); }
    catch (e) { setMsg('listMsg', e.message, 'err'); }
  }
  function revokeKey(key) {
    rowAction('revoke', key, '이 키를 폐기(환불/차단)할까요?\n' + key + '\n\n폐기하면 그 폰에서 다음 확인 때 잠깁니다. (나중에 되살리기 가능)');
  }
  function restoreKey(key) {
    rowAction('restore', key, '이 키를 되살릴까요?\n' + key + '\n\n폐기를 취소하고 다시 사용 가능해집니다. (묶였던 폰이 있으면 그 폰에서 다시 작동)');
  }
  function deleteKey(key) {
    rowAction('delete', key, '⚠️ 이 키를 완전히 삭제할까요?\n' + key + '\n\n되돌릴 수 없습니다. 활성 손님이면 그 손님 앱이 잠깁니다.\n(테스트 키·완전 정리용)');
  }

  function setMsg(id, text, cls) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (cls || '');
  }
</script>
</body>
</html>
