<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>라이선스 관리 (브릿지 · 크롬)</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Malgun Gothic", sans-serif; background:#0f172a; color:#e2e8f0; margin:0; padding:24px; }
  .wrap { max-width: 960px; margin:0 auto; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:#94a3b8; font-size:13px; margin-bottom:20px; }
  .card { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:18px; margin-bottom:18px; }
  .card h2 { font-size:15px; margin:0 0 12px; color:#f8fafc; }
  label { display:block; font-size:13px; color:#94a3b8; margin:10px 0 4px; }
  input[type=text], input[type=password], input[type=date], input[type=tel], input[type=number] { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:#e2e8f0; font-size:14px; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
  button { cursor:pointer; border:none; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:600; color:#fff; background:#6366f1; }
  button:hover { opacity:.9; }
  button.ghost { background:#334155; }
  button.danger { background:#dc2626; }
  button.warn { background:#d97706; }
  button.restore { background:#16a34a; }
  button.sm { padding:6px 10px; font-size:12px; }
  .row { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
  .row > div { flex:1; min-width:180px; }
  .newkey { margin-top:14px; padding:14px; background:#052e16; border:1px solid #16a34a; border-radius:8px; display:none; }
  .newkey code { font-size:22px; font-weight:700; letter-spacing:1px; color:#4ade80; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid #334155; white-space:nowrap; }
  th { color:#94a3b8; font-weight:600; }
  .badge { padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; }
  .b-active { background:#052e16; color:#4ade80; }
  .b-unused { background:#1e293b; color:#94a3b8; border:1px solid #475569; }
  .b-revoked { background:#450a0a; color:#f87171; }
  .msg { font-size:13px; margin-top:8px; min-height:18px; }
  .err { color:#f87171; }
  .ok { color:#4ade80; }
  .tablewrap { overflow-x:auto; }
  .muted { color:#64748b; }
  /* 제품 탭 */
  .seg { display:flex; gap:8px; }
  .seg-btn { background:#0f172a; border:1px solid #475569; color:#94a3b8; font-weight:700; }
  .seg-btn.active { background:#6366f1; border-color:#6366f1; color:#fff; }
</style>
</head>
<body>
<div class="wrap">
  <h1>라이선스 관리</h1>
  <div class="sub">브릿지 · 멀티프로필 키를 한 곳에서 각각 발급 · 폐기합니다.</div>

  <div class="card" id="authCard">
    <h2>🔑 관리자 로그인</h2>
    <div id="loginBox">
      <div class="row">
        <div>
          <label>관리자 비밀번호</label>
          <input type="password" id="adminToken" placeholder="비밀번호 입력 후 로그인" autocomplete="off" onkeydown="if(event.key==='Enter')login()">
        </div>
        <button onclick="login()">로그인</button>
      </div>
      <div class="msg muted">🔒 저장하지 않습니다. 페이지를 열 때마다 로그인하세요.</div>
      <div class="msg" id="loginMsg"></div>
    </div>
    <div id="loggedInBox" style="display:none">
      <div class="row" style="align-items:center">
        <div style="flex:1"><span class="badge b-active" style="font-size:14px;padding:5px 12px">✅ 로그인됨</span></div>
        <button class="ghost" onclick="logout()">로그아웃</button>
      </div>
    </div>
  </div>

  <div id="adminArea" style="display:none">

  <!-- 제품 선택 탭 -->
  <div class="card">
    <div class="seg">
      <button id="tab-bridge" class="seg-btn active" onclick="switchProduct('bridge')">🌉 브릿지</button>
      <button id="tab-chrome" class="seg-btn" onclick="switchProduct('chrome')">🌐 멀티프로필</button>
    </div>
    <div class="msg muted" id="prodMsg" style="margin-top:10px">지금 관리 중: <b id="prodLabel">브릿지</b></div>
  </div>

  <div class="card">
    <h2>➕ 새 키 발급</h2>
    <div class="row">
      <div id="phoneWrap" style="flex:1 1 220px">
        <label>받는 분 전화번호 (필수 · 손님 구분 키)</label>
        <input type="tel" id="phone" placeholder="예: 010-1234-5678" autocomplete="off">
      </div>
      <div style="flex:1 1 160px">
        <label id="memoLabel">메모 (선택 · 이름 등)</label>
        <input type="text" id="memo" placeholder="예: 홍길동" autocomplete="off">
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <div style="flex:0 0 90px">
        <label>개수</label>
        <input type="number" id="count" value="1" min="1" max="50">
      </div>
      <div style="flex:0 0 200px">
        <label>사용 가능 마지막 날짜 (비우면 영구)</label>
        <input type="date" id="expiry">
      </div>
      <button onclick="issueKey()">키 발급</button>
    </div>
    <div class="newkey" id="newkeyBox">
      <div style="margin-bottom:8px;font-size:13px;color:#94a3b8" id="newkeyHint">발급된 키 (받는 분에게 전달)</div>
      <code id="newkeyVal"></code>
      <button class="ghost sm" style="margin-left:10px" onclick="copyKey()">전체 복사</button>
    </div>
    <div class="msg" id="issueMsg"></div>
  </div>

  <div class="card">
    <h2>📋 발급 목록 <button class="ghost sm" style="margin-left:8px" onclick="loadList()">새로고침</button></h2>
    <input type="text" id="searchBox" placeholder="🔍 키·받는사람으로 검색" oninput="renderRows()" autocomplete="off" style="margin-bottom:12px">
    <div class="tablewrap">
      <table>
        <thead id="listHead"></thead>
        <tbody id="listBody"><tr><td colspan="8" class="muted">로그인하면 목록이 보입니다.</td></tr></tbody>
      </table>
    </div>
    <div class="msg" id="listMsg"></div>
  </div>
  </div><!-- /adminArea -->
</div>

<script>
  // 브릿지·크롬 모두 '같은 Supabase 프로젝트'의 서로 다른 함수를 호출.
  // 관리자 비번(admin_token)은 두 함수가 동일하게 쓰므로 로그인 한 번으로 둘 다 관리됨.
  const BASE = "https://wfmdfvkuqgxjyabphfrm.supabase.co/functions/v1";
  const APIKEY = "sb_publishable_tYcexAE3U5jcj07Qe0R8kA_9PxoIJGj"; // 공개키(안전)

  const PRODUCTS = {
    bridge: {
      label: "브릿지",
      fn: BASE + "/admin-licenses",
      needsPhone: true,
      searchPlaceholder: "🔍 전화번호·키·메모로 검색 (같은 손님끼리 묶여서 보임)",
      newkeyHint: "발급된 키 (손님에게 전달 · 활성화 시 손님 폰에 바인딩)",
      memoLabel: "메모 (선택 · 이름 등)",
      cols: ["키","전화번호","메모","상태","기기","만료","마지막 확인","작업"],
    },
    chrome: {
      label: "멀티프로필",
      fn: BASE + "/chrome-admin",
      needsPhone: false,
      searchPlaceholder: "🔍 키·받는사람·PC이름으로 검색",
      newkeyHint: "발급된 키 (받는 분에게 전달 · 활성화 시 그 PC에 바인딩)",
      memoLabel: "받는 사람 (선택 · 이름/메모)",
      cols: ["키","받는 사람","상태","활성 PC","만료","마지막 확인","작업"],
    },
  };
  let PRODUCT = "bridge";
  function cfg() { return PRODUCTS[PRODUCT]; }

  let allRows = [];
  let lastIssued = [];
  let authToken = null; // 로그인 세션 동안만 메모리에 유지(저장 안 함)

  function token() { return authToken; }

  async function login() {
    const pw = document.getElementById('adminToken').value.trim();
    if (!pw) { setMsg('loginMsg', '비밀번호를 입력하세요.', 'err'); return; }
    setMsg('loginMsg', '확인 중...', '');
    authToken = pw;
    try {
      await call('ping', {});
      document.getElementById('adminToken').value = '';
      setMsg('loginMsg', '', '');
      setLoggedIn(true);
      applyProductUI();
      loadList();
    } catch (e) {
      authToken = null;
      setMsg('loginMsg', e.message, 'err');
    }
  }

  function logout() {
    authToken = null; allRows = []; lastIssued = [];
    document.getElementById('newkeyBox').style.display = 'none';
    document.getElementById('listBody').innerHTML =
      '<tr><td colspan="8" class="muted">로그인하면 목록이 보입니다.</td></tr>';
    setMsg('listMsg', '', ''); setMsg('issueMsg', '', '');
    setLoggedIn(false);
  }

  function setLoggedIn(v) {
    document.getElementById('loginBox').style.display = v ? 'none' : 'block';
    document.getElementById('loggedInBox').style.display = v ? 'block' : 'none';
    document.getElementById('adminArea').style.display = v ? 'block' : 'none';
  }

  // 제품 전환(로그인 유지 · 목록만 다시 불러옴)
  function switchProduct(p) {
    if (!PRODUCTS[p] || p === PRODUCT) { if (p === PRODUCT) return; }
    PRODUCT = p;
    document.getElementById('tab-bridge').classList.toggle('active', p === 'bridge');
    document.getElementById('tab-chrome').classList.toggle('active', p === 'chrome');
    lastIssued = [];
    document.getElementById('newkeyBox').style.display = 'none';
    setMsg('issueMsg', '', '');
    applyProductUI();
    if (authToken) loadList();
  }

  // 현재 제품에 맞춰 폼·라벨·검색창을 조정
  function applyProductUI() {
    const c = cfg();
    document.getElementById('prodLabel').textContent = c.label;
    document.getElementById('phoneWrap').style.display = c.needsPhone ? '' : 'none';
    document.getElementById('memoLabel').textContent = c.memoLabel;
    document.getElementById('newkeyHint').textContent = c.newkeyHint;
    document.getElementById('searchBox').placeholder = c.searchPlaceholder;
    document.getElementById('listHead').innerHTML =
      '<tr>' + c.cols.map(h => '<th>' + h + '</th>').join('') + '</tr>';
  }

  function normPhone(s) { return (s || '').replace(/\D/g, ''); }
  function fmtPhone(s) {
    const d = normPhone(s);
    if (d.length === 11) return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
    if (d.length === 10) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
    return s || '';
  }

  async function call(action, extra) {
    const t = token();
    if (!t) throw new Error('관리자 비밀번호를 먼저 입력하세요.');
    const res = await fetch(cfg().fn, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': APIKEY, 'Authorization': 'Bearer ' + APIKEY },
      body: JSON.stringify(Object.assign({ admin_token: t, action }, extra || {}))
    });
    const data = await res.json().catch(() => ({}));
    if (!data.ok) {
      if (data.reason === 'unauthorized') throw new Error('비밀번호가 틀렸습니다.');
      if (data.reason === 'server_misconfigured') throw new Error('서버에 관리자 토큰이 설정되지 않았습니다.');
      throw new Error(data.reason || ('오류(HTTP ' + res.status + ')'));
    }
    return data;
  }

  async function issueKey() {
    const c = cfg();
    const extraBase = {};
    if (c.needsPhone) {
      const phone = normPhone(document.getElementById('phone').value);
      if (!phone) { setMsg('issueMsg', '받는 분 전화번호를 입력하세요.', 'err'); return; }
      extraBase.phone = phone;
    }
    const memo = document.getElementById('memo').value.trim();
    if (memo) extraBase.order_ref = memo;
    const count = Math.max(1, Math.min(50, parseInt(document.getElementById('count').value, 10) || 1));
    const dateStr = document.getElementById('expiry').value;
    const expires_at = dateStr ? new Date(dateStr + 'T23:59:59').toISOString() : undefined;

    setMsg('issueMsg', count + '개 발급 중...', '');
    lastIssued = [];
    try {
      for (let i = 0; i < count; i++) {
        const extra = Object.assign({}, extraBase);
        if (expires_at) extra.expires_at = expires_at;
        const data = await call('issue', extra);
        lastIssued.push(data.license_key);
      }
      document.getElementById('newkeyVal').innerHTML = lastIssued.join('<br>');
      document.getElementById('newkeyBox').style.display = 'block';
      setMsg('issueMsg', lastIssued.length + '개 발급 완료', 'ok');
      loadList();
    } catch (e) {
      if (lastIssued.length) {
        document.getElementById('newkeyVal').innerHTML = lastIssued.join('<br>');
        document.getElementById('newkeyBox').style.display = 'block';
      }
      setMsg('issueMsg', e.message + (lastIssued.length ? ' (' + lastIssued.length + '개는 발급됨)' : ''), 'err');
      loadList();
    }
  }

  function copyKey() {
    if (!lastIssued.length) return;
    navigator.clipboard.writeText(lastIssued.join('\n'))
      .then(() => setMsg('issueMsg', '복사됨 (' + lastIssued.length + '개)', 'ok'));
  }

  function fmtDate(s) {
    if (!s) return '<span class="muted">-</span>';
    const d = new Date(s);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function badge(status) {
    const map = { active:'활성', unused:'미사용', revoked:'폐기' };
    return '<span class="badge b-' + status + '">' + (map[status]||status) + '</span>';
  }
  function fmtExpiry(s) {
    if (!s) return '<span class="muted">영구</span>';
    const days = Math.ceil((new Date(s).getTime() - Date.now()) / 86400000);
    if (days < 0) return '<span style="color:#f87171">만료됨</span>';
    if (days <= 7) return fmtDate(s) + ' <span style="color:#fbbf24">(D-' + days + ')</span>';
    return fmtDate(s);
  }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  async function loadList() {
    setMsg('listMsg', '불러오는 중...', '');
    try {
      const data = await call('list', {});
      allRows = data.rows || [];
      if (PRODUCT === 'bridge') {
        // 같은 전화번호(손님)끼리 묶고, 그 안은 최신 발급순
        allRows.sort((a, b) => {
          const pa = normPhone(a.phone), pb = normPhone(b.phone);
          if (pa !== pb) return pa < pb ? -1 : 1;
          return (b.created_at || '').localeCompare(a.created_at || '');
        });
      }
      renderRows();
    } catch (e) { setMsg('listMsg', e.message, 'err'); }
  }

  function renderRows() {
    const c = cfg();
    const raw = document.getElementById('searchBox').value.trim();
    const qDigit = normPhone(raw);
    const qLower = raw.toLowerCase();
    let rows = allRows;
    if (raw) {
      rows = allRows.filter(r => {
        if (c.needsPhone && qDigit && normPhone(r.phone).includes(qDigit)) return true;
        if ((r.license_key || '').toLowerCase().includes(qLower)) return true;
        if ((r.order_ref || '').toLowerCase().includes(qLower)) return true;
        if ((r.device_name || '').toLowerCase().includes(qLower)) return true;
        return false;
      });
    }
    const colspan = c.cols.length;
    const body = document.getElementById('listBody');
    if (!rows.length) {
      body.innerHTML = '<tr><td colspan="' + colspan + '" class="muted">' +
        (allRows.length ? '검색 결과가 없습니다.' : '아직 발급된 키가 없습니다.') + '</td></tr>';
      setMsg('listMsg', '', 'muted');
      return;
    }
    body.innerHTML = rows.map(r => PRODUCT === 'bridge' ? bridgeRow(r) : chromeRow(r)).join('');
    if (PRODUCT === 'bridge') {
      const phones = new Set(rows.map(r => normPhone(r.phone)).filter(Boolean));
      setMsg('listMsg', rows.length + '건 · 손님 ' + phones.size + '명', 'muted');
    } else {
      setMsg('listMsg', rows.length + '건', 'muted');
    }
  }

  function bridgeRow(r) {
    const dev = r.device_id ? '<span class="ok">등록됨</span>' : '<span class="muted">미등록</span>';
    const key = esc(r.license_key);
    return '<tr>' +
      '<td><code>' + key + '</code></td>' +
      '<td>' + esc(fmtPhone(r.phone)) + '</td>' +
      '<td>' + esc(r.order_ref || '') + '</td>' +
      '<td>' + badge(r.status) + '</td>' +
      '<td>' + dev + '</td>' +
      '<td>' + fmtExpiry(r.expires_at) + '</td>' +
      '<td>' + fmtDate(r.last_verified_at) + '</td>' +
      '<td>' + rowActions(key, r, false) + '</td>' +
    '</tr>';
  }

  function chromeRow(r) {
    const key = esc(r.license_key);
    const pc = r.device_id
      ? '<span class="ok">' + esc(r.device_name || '등록됨') + '</span>'
      : '<span class="muted">미등록</span>';
    return '<tr>' +
      '<td><code>' + key + '</code></td>' +
      '<td>' + esc(r.order_ref || '') + '</td>' +
      '<td>' + badge(r.status) + '</td>' +
      '<td>' + pc + '</td>' +
      '<td>' + fmtExpiry(r.expires_at) + '</td>' +
      '<td>' + fmtDate(r.last_verified_at) + '</td>' +
      '<td>' + rowActions(key, r, true) + '</td>' +
    '</tr>';
  }

  // 공통 작업 버튼. hasUnbind=true(크롬)면 바인딩된 경우 'PC해제' 추가.
  function rowActions(key, r, hasUnbind) {
    let a = '';
    if (r.status === 'revoked') {
      a += '<button class="restore sm" onclick="restoreKey(\'' + key + '\')">되살리기</button> ';
    } else {
      a += '<button class="danger sm" onclick="revokeKey(\'' + key + '\')">폐기</button> ';
    }
    if (hasUnbind && r.device_id) {
      a += '<button class="warn sm" onclick="unbindKey(\'' + key + '\')">PC해제</button> ';
    }
    a += '<button class="ghost sm" onclick="deleteKey(\'' + key + '\')">삭제</button>';
    return a;
  }

  async function rowAction(action, key, confirmMsg) {
    if (!confirm(confirmMsg)) return;
    try { await call(action, { license_key: key }); loadList(); }
    catch (e) { setMsg('listMsg', e.message, 'err'); }
  }
  function revokeKey(key) {
    rowAction('revoke', key, '이 키를 폐기(차단)할까요?\n' + key + '\n\n폐기하면 다음 확인 때 잠깁니다. (되살리기 가능)');
  }
  function restoreKey(key) {
    rowAction('restore', key, '이 키를 되살릴까요?\n' + key + '\n\n폐기를 취소하고 다시 사용 가능해집니다.');
  }
  function unbindKey(key) {
    rowAction('unbind', key, '이 키의 PC 바인딩을 풀까요?\n' + key + '\n\n다른 PC에서 다시 활성화할 수 있게 됩니다. (PC 이전용)');
  }
  function deleteKey(key) {
    rowAction('delete', key, '⚠️ 이 키를 완전히 삭제할까요?\n' + key + '\n\n되돌릴 수 없습니다.');
  }

  function setMsg(id, text, cls) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + (cls || '');
  }
</script>
</body>
</html>
