<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>BlogStudio 관리자</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --bg:#f6f8f9; --card:#fff; --green:#12805c; --green2:#0e6a4c; --tint:#e8f6f0;
    --line:#e5e7eb; --ink:#111827; --soft:#6b7280; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); line-height:1.6;
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased; }
  header{ background:var(--card); border-bottom:1px solid var(--line); color:var(--ink);
    padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10; }
  header .brand{ font-size:18px; font-weight:800; letter-spacing:-.02em; }
  header .brand span{ color:var(--green); }
  header .who{ font-size:13px; color:var(--soft); }
  header .logout{ margin-left:6px; cursor:pointer; font-size:13px; color:var(--soft); }
  header .logout:hover{ color:var(--ink); }
  .wrap{ max-width:840px; margin:0 auto; padding:24px 16px 60px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:20px; margin-bottom:18px; box-shadow:0 1px 3px rgba(17,24,39,.04); }
  h2{ margin:0 0 16px; font-size:16px; font-weight:800; color:var(--ink); letter-spacing:-.01em;
    display:flex; align-items:center; gap:8px; }
  .count{ color:var(--green); font-weight:800; background:var(--tint); padding:2px 10px; border-radius:20px; font-size:13px; }
  table{ width:100%; border-collapse:collapse; font-size:14px; }
  th,td{ text-align:left; padding:11px 8px; border-bottom:1px solid var(--line); }
  th{ color:var(--soft); font-weight:700; font-size:11.5px; letter-spacing:.02em; text-transform:uppercase; }
  tr:last-child td{ border-bottom:none; }
  .empty{ color:var(--soft); padding:16px 4px; font-size:14px; }
  button{ border:none; border-radius:8px; padding:8px 13px; font-size:13px; font-weight:700; cursor:pointer; transition:.15s; }
  .ok{ background:var(--green); color:#fff; } .ok:hover{ background:var(--green2); }
  .no{ background:#f3f4f6; color:#4b5563; } .no:hover{ background:#e5e7eb; }
  .danger{ background:#fef2f2; color:#dc2626; } .danger:hover{ background:#fee2e2; }
  .badge{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
  .bd-sus{ background:#fef2f2; color:#dc2626; }
  .bd-adm{ background:var(--tint); color:var(--green); }
  .gate{ max-width:420px; margin:90px auto; text-align:center; padding:36px 28px;
    background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:0 8px 30px rgba(17,24,39,.06); }
  .gate a,.gate button.link{ display:inline-block; margin-top:16px; background:var(--green); color:#fff;
    padding:11px 20px; border-radius:10px; text-decoration:none; font-weight:700; font-size:14px; border:none; cursor:pointer; }
  .muted{ color:var(--soft); font-size:13px; }
  .amt{ font-variant-numeric:tabular-nums; }
  .fl{ display:block; font-size:12.5px; font-weight:700; margin:13px 0 5px; color:var(--ink); }
  .fi{ width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 11px; font-size:14px;
    font-family:inherit; outline:none; }
  .fi:focus{ border-color:var(--green); box-shadow:0 0 0 3px var(--tint); }
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .mtitle{ font-size:17px; font-weight:800; margin-bottom:2px; }
  .msub{ font-size:12.5px; color:var(--soft); margin-bottom:10px; }
  .chip{ display:inline-block; font-size:11.5px; font-weight:700; background:var(--tint); color:var(--green);
    padding:2px 9px; border-radius:20px; margin:0 4px 4px 0; }
  .rline{ display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-bottom:1px solid var(--line); }
</style>
</head>
<body>

<div id="gate" class="gate" style="display:none;"></div>

<div id="panel" style="display:none;">
  <header>
    <div class="brand">Blog<span>Studio</span> 관리자</div>
    <div><span class="who" id="who"></span><span class="logout" onclick="logout()">로그아웃</span></div>
  </header>
  <div class="wrap">

    <div class="card">
      <h2>💰 입금 대기 <span class="count" id="crCount">0</span>건</h2>
      <div id="crBox"></div>
    </div>

    <div class="card">
      <h2>👤 회원 <span class="count" id="uCount">0</span>명</h2>
      <div id="uBox"></div>
    </div>

    <div class="card">
      <h2>📊 순위 리포트 <span class="count" id="plCount">0</span>곳
        <button class="ok" style="margin-left:auto;" onclick="openPlaceForm()">+ 새 가게</button></h2>
      <div id="plBox"></div>
    </div>

  </div>
</div>

<!-- 모달 -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(17,24,39,.45); z-index:50; overflow-y:auto;">
  <div id="modalCard" style="max-width:560px; margin:40px auto; background:#fff; border-radius:16px; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.25);"></div>
</div>

<script>
const SB_URL  = 'https://enqsuymbsugrkmstewek.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVucXN1eW1ic3Vncmttc3Rld2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDg1MzQsImV4cCI6MjA5ODQyNDUzNH0.LsVx4Eob26nBQ_sD_VjFoSXPgIQcTTaNSql48gdvgLM';
const sb = supabase.createClient(SB_URL, SB_ANON);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const won = n => (n==null?'-':Number(n).toLocaleString()+'원');

function showGate(html){
  document.getElementById('panel').style.display='none';
  const g=document.getElementById('gate'); g.style.display='block'; g.innerHTML=html;
}

async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){
    showGate('<div style="font-size:20px;font-weight:800;color:#111827;">관리자 로그인</div>'
      +'<p class="muted" style="margin-top:8px;">주문 페이지에서 로그인한 뒤 다시 들어오세요.</p>'
      +'<a href="order.html">로그인하러 가기</a>');
    return;
  }
  // 관리자 여부 확인 (RLS: 본인 프로필 조회)
  const { data:me } = await sb.from('profiles').select('nickname,is_admin').eq('id', session.user.id).single();
  if(!me || !me.is_admin){
    showGate('<div style="font-size:20px;font-weight:800;color:#dc2626;">접근 권한 없음</div>'
      +'<p class="muted">이 화면은 관리자 전용입니다.</p>'
      +'<button class="link" onclick="logout()">로그아웃</button>');
    return;
  }
  document.getElementById('gate').style.display='none';
  document.getElementById('panel').style.display='block';
  document.getElementById('who').textContent = (me.nickname||'관리자')+'님 · ';
  loadCharges(); loadUsers(); loadPlaces();
}

async function loadCharges(){
  const { data, error } = await sb.from('charge_requests')
    .select('id,points,amount_krw,depositor,created_at, profiles(nickname)')
    .eq('status','pending').order('created_at',{ascending:true});
  const box=document.getElementById('crBox');
  if(error){ box.innerHTML='<div class="empty">불러오기 오류: '+esc(error.message)+'</div>'; return; }
  document.getElementById('crCount').textContent = data.length;
  if(!data.length){ box.innerHTML='<div class="empty">대기 중인 입금 신청이 없습니다.</div>'; return; }
  let h='<table><tr><th>신청자</th><th>입금자명</th><th>금액</th><th>포인트</th><th>신청시각</th><th></th></tr>';
  for(const r of data){
    h+='<tr>'
      +'<td>'+esc(r.profiles?.nickname||'-')+'</td>'
      +'<td>'+esc(r.depositor||'-')+'</td>'
      +'<td class="amt">'+won(r.amount_krw)+'</td>'
      +'<td class="amt">'+esc(r.points)+'P</td>'
      +'<td class="muted">'+new Date(r.created_at).toLocaleString('ko-KR')+'</td>'
      +'<td style="white-space:nowrap;">'
      +'<button class="ok" onclick="approve(\''+r.id+'\')">승인</button> '
      +'<button class="no" onclick="reject(\''+r.id+'\')">거절</button></td>'
      +'</tr>';
  }
  box.innerHTML=h+'</table>';
}

async function loadUsers(){
  const { data, error } = await sb.from('profiles')
    .select('id,nickname,point_balance,is_suspended,is_admin').order('created_at',{ascending:true});
  const box=document.getElementById('uBox');
  if(error){ box.innerHTML='<div class="empty">불러오기 오류: '+esc(error.message)+'</div>'; return; }
  document.getElementById('uCount').textContent = data.length;
  let h='<table><tr><th>닉네임</th><th>보유P</th><th>상태</th><th></th></tr>';
  for(const u of data){
    const badges = (u.is_admin?'<span class="badge bd-adm">관리자</span> ':'')
                 + (u.is_suspended?'<span class="badge bd-sus">정지됨</span>':'');
    const btn = u.is_admin ? '<span class="muted">-</span>'
      : (u.is_suspended
          ? '<button class="ok" onclick="suspend(\''+u.id+'\',false)">정지 해제</button>'
          : '<button class="danger" onclick="suspend(\''+u.id+'\',true)">계정 정지</button>');
    h+='<tr><td>'+esc(u.nickname||'-')+'</td><td class="amt">'+esc(u.point_balance)+'P</td>'
      +'<td>'+(badges||'<span class="muted">정상</span>')+'</td><td>'+btn+'</td></tr>';
  }
  box.innerHTML=h+'</table>';
}

async function approve(id){
  if(!confirm('입금 확인 → 포인트를 지급합니다. 승인할까요?')) return;
  const { error } = await sb.rpc('approve_charge',{ p_request_id:id });
  if(error){ alert('승인 실패: '+error.message); return; }
  await loadCharges(); await loadUsers();
}
async function reject(id){
  const memo = prompt('거절 사유(선택):','');
  if(memo===null) return;
  const { error } = await sb.rpc('reject_charge',{ p_request_id:id, p_memo:memo||null });
  if(error){ alert('거절 실패: '+error.message); return; }
  await loadCharges();
}
async function suspend(id, on){
  if(!confirm(on?'이 계정을 정지할까요? (주문 불가)':'정지를 해제할까요?')) return;
  const { error } = await sb.rpc('set_suspended',{ p_user_id:id, p_suspend:on });
  if(error){ alert((on?'정지':'해제')+' 실패: '+error.message); return; }
  await loadUsers();
}
async function logout(){ await sb.auth.signOut(); location.href='order.html'; }

/* ============== 순위 리포트 관리 ============== */
const reportBase = location.origin + location.pathname.replace(/admin\.html$/, '') + 'report.html';
function openModal(html){ document.getElementById('modalCard').innerHTML=html; document.getElementById('modal').style.display='block'; }
function closeModal(){ document.getElementById('modal').style.display='none'; }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
const today = ()=> new Date().toISOString().slice(0,10);
const thisMonth = ()=> today().slice(0,7)+'-01';

let PLACES=[];
async function loadPlaces(){
  const { data, error } = await sb.rpc('admin_list_places');
  const box=document.getElementById('plBox');
  if(error){ box.innerHTML='<div class="empty">불러오기 오류: '+esc(error.message)+'</div>'; return; }
  PLACES = data||[];
  document.getElementById('plCount').textContent = PLACES.length;
  if(!PLACES.length){ box.innerHTML='<div class="empty">등록된 가게가 없습니다. [+ 새 가게]로 추가하세요.</div>'; return; }
  let h='<table><tr><th>상호</th><th>지역·업종</th><th>키워드</th><th></th></tr>';
  for(const p of PLACES){
    const kwN=(p.target_keywords||[]).length;
    h+='<tr><td><b>'+esc(p.name)+'</b></td>'
      +'<td class="muted">'+esc([p.region,p.biztype].filter(Boolean).join(' · ')||'-')+'</td>'
      +'<td class="amt">'+kwN+'개</td>'
      +'<td style="white-space:nowrap;">'
      +'<button class="ok" onclick="openPlace(\''+p.id+'\')">입력</button> '
      +'<button class="no" onclick="copyLink(\''+p.share_token+'\')">링크복사</button> '
      +'<button class="no" onclick="openPlaceForm(\''+p.id+'\')">수정</button> '
      +'<button class="danger" onclick="delPlace(\''+p.id+'\',\''+esc(p.name).replace(/\x27/g,"")+'\')">삭제</button></td></tr>';
  }
  box.innerHTML=h+'</table>';
}
function copyLink(token){
  const url = reportBase+'?t='+token;
  navigator.clipboard.writeText(url).then(()=>alert('리포트 링크 복사됨!\n\n'+url+'\n\n사장님께 이 링크를 보내세요.'),
    ()=>prompt('아래 링크를 복사하세요:', url));
}
function openPlaceForm(id){
  const p = id? PLACES.find(x=>x.id===id) : {};
  openModal(
    '<div class="mtitle">'+(id?'가게 수정':'새 가게 등록')+'</div>'
    +'<div class="msub">추적할 키워드는 쉼표로 구분해 넣으세요.</div>'
    +'<label class="fl">상호명 *</label><input class="fi" id="pf_name" value="'+esc(p.name||'')+'" placeholder="예: 미소플러스치과">'
    +'<div class="row2"><div><label class="fl">지역</label><input class="fi" id="pf_region" value="'+esc(p.region||'')+'" placeholder="송도"></div>'
    +'<div><label class="fl">업종</label><input class="fi" id="pf_biztype" value="'+esc(p.biztype||'')+'" placeholder="치과"></div></div>'
    +'<label class="fl">네이버 플레이스 URL (선택)</label><input class="fi" id="pf_url" value="'+esc(p.place_url||'')+'" placeholder="https://...">'
    +'<label class="fl">추적 키워드 (쉼표 구분)</label><input class="fi" id="pf_kw" value="'+esc((p.target_keywords||[]).join(', '))+'" placeholder="송도치과, 송도임플란트">'
    +'<label class="fl">메모 (선택)</label><input class="fi" id="pf_memo" value="'+esc(p.memo||'')+'">'
    +'<div style="margin-top:18px;display:flex;gap:8px;justify-content:flex-end;">'
    +'<button class="no" onclick="closeModal()">취소</button>'
    +'<button class="ok" onclick="savePlace('+(id?"\'"+id+"\'":'null')+')">저장</button></div>'
  );
}
async function savePlace(id){
  const name=document.getElementById('pf_name').value.trim();
  if(!name){ alert('상호명을 넣어주세요.'); return; }
  const kw=document.getElementById('pf_kw').value.split(',').map(s=>s.trim()).filter(Boolean);
  const { error } = await sb.rpc('admin_upsert_place',{
    p_id:id, p_name:name,
    p_region:document.getElementById('pf_region').value.trim()||null,
    p_biztype:document.getElementById('pf_biztype').value.trim()||null,
    p_place_url:document.getElementById('pf_url').value.trim()||null,
    p_keywords:kw, p_memo:document.getElementById('pf_memo').value.trim()||null });
  if(error){ alert('저장 실패: '+error.message); return; }
  closeModal(); await loadPlaces();
}
async function delPlace(id,name){
  if(!confirm('['+name+'] 가게와 모든 순위 기록을 삭제할까요? 되돌릴 수 없습니다.')) return;
  const { error } = await sb.rpc('admin_delete_place',{ p_id:id });
  if(error){ alert('삭제 실패: '+error.message); return; }
  await loadPlaces();
}

async function openPlace(id){
  const p = PLACES.find(x=>x.id===id);
  const { data, error } = await sb.rpc('admin_place_detail',{ p_id:id });
  if(error){ alert('불러오기 실패: '+error.message); return; }
  const ranks=data.ranks||[], months=data.months||[];
  const kws=(p.target_keywords||[]);
  const kwOpts = kws.length? kws.map(k=>'<option>'+esc(k)+'</option>').join('') : '<option value="">(키워드 없음 — 먼저 수정에서 추가)</option>';
  let rankRows = ranks.slice(0,12).map(r=>'<div class="rline"><span>'+esc(r.keyword)+' <span class="muted">'+r.checked_on+'</span></span><b>'+(r.rank==null?'순위밖':r.rank+'위')+'</b></div>').join('') || '<div class="muted" style="padding:6px 0">아직 기록 없음</div>';
  let monRows = months.map(m=>{const s=m.stats||{}; return '<div class="rline"><span>'+esc(m.ym)+'</span><span class="muted">조회 '+(s.views||0)+' · 유입 '+(s.visits||0)+' · 클릭 '+(s.reserve_clicks||0)+'</span></div>';}).join('') || '<div class="muted" style="padding:6px 0">아직 없음</div>';
  openModal(
    '<div class="mtitle">'+esc(p.name)+' · 데이터 입력</div>'
    +'<div class="msub">키워드칩: '+(kws.map(k=>'<span class="chip">'+esc(k)+'</span>').join('')||'없음')+'</div>'
    +'<div style="background:#f6f8f9;border-radius:12px;padding:14px;margin-bottom:14px;">'
    +'<div style="font-weight:800;font-size:13.5px;margin-bottom:8px;">🔑 순위 기록</div>'
    +'<div class="row3">'
    +'<div><label class="fl">키워드</label><select class="fi" id="rk_kw">'+kwOpts+'</select></div>'
    +'<div><label class="fl">측정일</label><input class="fi" id="rk_date" type="date" value="'+today()+'"></div>'
    +'<div><label class="fl">순위 (빈칸=순위밖)</label><input class="fi" id="rk_rank" type="number" min="1" placeholder="예: 7"></div>'
    +'</div>'
    +'<button class="ok" style="margin-top:10px;" onclick="saveRank(\''+id+'\')">순위 저장</button>'
    +'<div style="margin-top:12px;">'+rankRows+'</div>'
    +'</div>'
    +'<div style="background:#f6f8f9;border-radius:12px;padding:14px;">'
    +'<div style="font-weight:800;font-size:13.5px;margin-bottom:8px;">📈 월간 노트 (이번달 한 일 + 통계)</div>'
    +'<label class="fl">해당 월</label><input class="fi" id="mn_month" type="month" value="'+thisMonth().slice(0,7)+'">'
    +'<label class="fl">이번달 한 일</label><textarea class="fi" id="mn_work" rows="3" placeholder="블로그 6건 발행, 소식 3건, 소개글 개편..."></textarea>'
    +'<div class="row3" style="margin-top:8px;">'
    +'<div><label class="fl">조회수</label><input class="fi" id="mn_views" type="number" min="0"></div>'
    +'<div><label class="fl">방문유입</label><input class="fi" id="mn_visits" type="number" min="0"></div>'
    +'<div><label class="fl">예약·클릭</label><input class="fi" id="mn_clicks" type="number" min="0"></div>'
    +'</div>'
    +'<button class="ok" style="margin-top:10px;" onclick="saveMonth(\''+id+'\')">월간 노트 저장</button>'
    +'<div style="margin-top:12px;">'+monRows+'</div>'
    +'</div>'
    +'<div style="margin-top:16px;display:flex;gap:8px;justify-content:space-between;align-items:center;">'
    +'<button class="no" onclick="copyLink(\''+p.share_token+'\')">📋 리포트 링크복사</button>'
    +'<button class="no" onclick="closeModal()">닫기</button></div>'
  );
}
async function saveRank(id){
  const kw=document.getElementById('rk_kw').value.trim();
  if(!kw){ alert('키워드가 없습니다. [수정]에서 추적 키워드를 먼저 추가하세요.'); return; }
  const rv=document.getElementById('rk_rank').value.trim();
  const { error } = await sb.rpc('admin_record_rank',{
    p_place_id:id, p_keyword:kw, p_rank: rv===''? null : parseInt(rv,10),
    p_checked_on: document.getElementById('rk_date').value || today() });
  if(error){ alert('저장 실패: '+error.message); return; }
  openPlace(id); // 새로고침
}
async function saveMonth(id){
  const stats={ views:num('mn_views'), visits:num('mn_visits'), reserve_clicks:num('mn_clicks') };
  const { error } = await sb.rpc('admin_save_month',{
    p_place_id:id, p_month: document.getElementById('mn_month').value+'-01',
    p_work_done: document.getElementById('mn_work').value.trim()||null, p_stats: stats });
  if(error){ alert('저장 실패: '+error.message); return; }
  openPlace(id);
}
function num(id){ const v=document.getElementById(id).value.trim(); return v===''?0:parseInt(v,10); }

boot();
</script>
