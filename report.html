<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>월간 순위 리포트 · BlogStudio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --primary:#123d2e; --primary-d:#0d2c22; --green:#12805c; --accent:#3a6ea5;
    --gold:#c79a3a; --gold-s:rgba(199,154,58,.14);
    --bg:#f7f6f1; --card:#fff; --input:#f0efeb;
    --text:#16231d; --sub:#4b5a52; --light:#7c8a82; --border:#e5e1d6;
    --good:#2e7d57; --bad:#c0392b; --tint:#edf5f1; --line:#f0f2ed;
    --sans:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--sans); background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased; letter-spacing:-.02em; line-height:1.6;}
  .num{font-variant-numeric:tabular-nums;}
  .wrap{max-width:1160px; margin:0 auto; padding:26px 20px 80px;}

  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .brand{font-size:15px; font-weight:800; letter-spacing:-.3px;} .brand span{color:var(--green);}
  .topbar .period{font-size:11.5px; color:var(--light); font-weight:600; letter-spacing:.02em;}

  /* 배너 히어로 (panze 스타일) */
  .banner{background:linear-gradient(120deg,#123d2e,#164a37 46%,#0d2c22); color:#fff;
    border-radius:22px; padding:26px 28px; position:relative; overflow:hidden;
    box-shadow:0 16px 40px rgba(18,61,46,.22);}
  .banner::after{content:''; position:absolute; right:-50px; top:-70px; width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle at 34% 34%, rgba(199,154,58,.32), rgba(199,154,58,.06) 58%, transparent 70%); pointer-events:none;}
  .banner>*{position:relative; z-index:1;}
  .eyebrow{font-size:10.5px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:#e7cf95; margin-bottom:12px;}
  .banner h1{font-size:28px; font-weight:800; letter-spacing:-.035em; line-height:1.15;}
  .banner .meta{margin-top:8px; font-size:13px; color:#c2d0c9;}
  .banner .meta b{color:#e6ede9; font-weight:600;}
  .chips{display:flex; gap:11px; margin-top:20px; flex-wrap:wrap;}
  .chip{flex:1; min-width:150px; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.14);
    border-radius:15px; padding:14px 16px; backdrop-filter:blur(2px);
    transition:transform .15s, background .15s, border-color .15s;}
  .chip:hover{transform:translateY(-3px); background:rgba(255,255,255,.17); border-color:rgba(231,207,149,.5);}
  .chip .v{font-size:22px; font-weight:800; letter-spacing:-.02em; line-height:1;}
  .chip .v small{font-size:12px; font-weight:700; color:#8fe0bd; margin-left:4px; letter-spacing:0;}
  .chip .v .gold{color:#e7cf95;}
  .chip .l{font-size:11px; color:#a9b8b0; margin-top:7px; letter-spacing:.01em;}

  .honest{font-size:12.2px; color:var(--sub); line-height:1.6; margin:16px 4px 0;}
  .honest b{color:var(--text); font-weight:700;}

  /* 네이버 실제 검색 화면 (proof — 데이터 정확성 시각 증명) */
  .proof-intro{font-size:12.5px; color:var(--sub); line-height:1.65; margin:0 4px 14px;}
  .proof-intro b{color:var(--text); font-weight:700;}
  .proof-card{display:flex; flex-direction:column;}
  .proof-head{display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:16px;}
  .proof-qlabel{font-size:10.5px; font-weight:700; letter-spacing:.08em; color:var(--light); text-transform:uppercase; margin-bottom:8px;}
  .proof-kw{display:inline-flex; align-items:center; gap:9px; font-size:19px; font-weight:800; letter-spacing:-.02em; color:var(--text);
    background:#fff; border:2px solid var(--primary); border-radius:999px; padding:9px 20px 9px 16px; box-shadow:0 4px 12px rgba(18,128,92,.14);}
  .proof-kw .mag{font-size:15px; line-height:1; filter:saturate(1.1);}
  .proof-basis{font-size:11px; color:var(--light); margin-top:10px;}
  .proof-rank{text-align:right; white-space:nowrap;}
  .proof-rank b{font-size:25px; font-weight:800; color:var(--primary); letter-spacing:-.03em;}
  .proof-rank span{font-size:12px; color:var(--light); margin-left:1px;}
  .proof-rank.out b{font-size:14px; color:var(--light);}
  .proof-body{display:grid; grid-template-columns:330px 1fr; gap:24px; align-items:start; margin-top:4px;}
  @media(max-width:760px){ .proof-body{grid-template-columns:1fr;} }
  .phone{position:relative; max-width:100%; margin:0; border-radius:20px; overflow:hidden; max-height:560px; overflow-y:auto;
    background:#eef1f0; box-shadow:inset 0 0 0 5px #fff, 0 0 0 1px var(--border), 0 8px 22px rgba(40,50,40,.12);}
  .proof-data{display:flex; flex-direction:column;}
  .pd-title{font-size:12px; font-weight:800; color:var(--primary); letter-spacing:.02em; margin-bottom:2px;}
  .pd-sub{font-size:11px; color:var(--light); margin-bottom:12px;}
  .pd-list{list-style:none; margin:0 0 16px; padding:0;}
  .pd-list li{display:flex; align-items:center; gap:11px; padding:10px; margin:0 -10px; border-bottom:1px solid var(--line); border-radius:9px; transition:background .12s;}
  .pd-list li:last-child{border-bottom:0;}
  .pd-list li.ours{background:#e6f2ec;}
  .pd-list li:hover{background:#f5f8f6;}
  .pd-list li.ours:hover{background:#dcece3;}
  .pd-r{width:24px; height:24px; flex:none; display:flex; align-items:center; justify-content:center; border-radius:7px; background:#eef1ef; color:var(--sub); font-size:12.5px; font-weight:800;}
  .pd-r.top{background:var(--primary); color:#fff;}
  .pd-nm{flex:1; font-size:13px; font-weight:600; letter-spacing:-.01em; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pd-me{display:inline-block; margin-left:6px; font-size:10px; font-weight:800; color:#fff; background:var(--primary); border-radius:5px; padding:1px 6px; vertical-align:1px;}
  .pd-metric{flex:none; width:220px; display:flex; align-items:center; gap:9px;}
  .pd-track{flex:1; height:9px; background:#eaeeeb; border-radius:5px; overflow:hidden;}
  .pd-fill{display:block; height:100%; background:linear-gradient(90deg,#8fc9ac,#12805c); border-radius:5px;}
  .pd-fill.mine{background:linear-gradient(90deg,#f0c96a,#d99a1a);}
  .pd-mval{font-size:11px; font-weight:700; color:var(--sub); white-space:nowrap; width:82px; text-align:right;}
  .pd-mval .u{font-weight:600; color:var(--light);}
  .pd-empty{color:var(--light); font-size:11px; text-align:center; width:220px;}
  .pd-visit{flex:none; width:76px; font-size:11px; color:var(--light); white-space:nowrap; text-align:right;}
  .pd-list li.ad{opacity:.72;}
  .pd-r.ad{background:#f0e8d4; color:#a9812f; font-size:9.5px; letter-spacing:.02em;}
  .pd-adtag{display:inline-block; margin-left:6px; font-size:10px; font-weight:700; color:#a9812f; background:#f7efdc; border-radius:5px; padding:1px 6px; vertical-align:1px;}
  .pd-adnote{flex:none; font-size:11px; color:var(--light);}
  li.pd-divider{display:block !important; padding:11px 2px 5px; margin:2px 0 0; font-size:10.5px; font-weight:800; color:var(--primary); letter-spacing:.03em; border-bottom:0 !important; background:none !important;}
  @media(max-width:640px){ .pd-visit{display:none;} .pd-metric,.pd-empty{width:140px;} .pd-mval{width:64px;} }
  .phone img{display:block; width:100%; height:auto;}
  .phone-hint{position:sticky; bottom:0; left:0; right:0; text-align:center; font-size:10.5px; color:#fff;
    background:linear-gradient(transparent, rgba(18,61,46,.78)); padding:16px 0 7px; pointer-events:none;}
  .phone-adwarn{position:sticky; top:0; left:0; right:0; z-index:2; text-align:center; font-size:11px; font-weight:700;
    color:#7a5a12; background:rgba(255,246,220,.96); border-bottom:1px solid #eadcae; padding:6px 8px;}
  .phone-adwarn b{color:#9a6b00;}
  .proof-verify{display:block; margin-top:12px; font-size:12.5px; font-weight:700; color:var(--primary);
    text-decoration:none; border:1px solid var(--border); border-radius:10px; padding:10px 12px; text-align:center;
    transition:background .13s,border-color .13s;}
  .proof-verify:hover{background:#f2f8f5; border-color:var(--primary);}
  .proof-note{font-size:10.8px; color:var(--light); line-height:1.55; margin-top:9px;}
  .proof-note b{color:var(--sub); font-weight:700;}

  .sec{display:flex; align-items:baseline; gap:10px; margin:34px 4px 14px;}
  .sec h2{font-size:11.5px; font-weight:800; letter-spacing:.13em; text-transform:uppercase; color:var(--primary);}
  .sec .ln{flex:1; height:1px; background:var(--border);}
  .sec .agg{font-size:11.5px; color:var(--light); font-weight:600;}

  .panel{background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px 22px;
    box-shadow:0 10px 26px rgba(40,50,40,.05); margin-bottom:14px; transition:box-shadow .15s, transform .15s;}
  .panel:hover{transform:translateY(-3px); box-shadow:0 18px 38px rgba(40,50,40,.13); border-color:#d6e4dd;}
  .panel h3{font-size:14.5px; font-weight:800; letter-spacing:-.02em; margin-bottom:2px;}
  .panel .psub{font-size:11.5px; color:var(--light); margin-bottom:14px;}
  .chartwrap{height:280px; position:relative;}

  /* 대시보드 그리드 */
  .dash{display:grid; gap:16px; margin-bottom:16px; align-items:start;}
  .dash .panel{margin-bottom:0; height:100%;}
  .dash.a{grid-template-columns:1.6fr 1fr;}
  .dash.b{grid-template-columns:1fr 1.6fr;}
  .dash.k{grid-template-columns:repeat(2,1fr);}
  @media(max-width:900px){ .dash.a,.dash.b,.dash.k{grid-template-columns:1fr;} }
  .stat-row{display:flex; align-items:center; justify-content:space-between; padding:15px 10px; margin:0 -10px; border-bottom:1px solid var(--line); border-radius:9px; transition:background .13s;}
  .stat-row:last-child{border-bottom:0;}
  .stat-row:hover{background:#f7faf8;}
  .stat-row .sl{font-size:12.5px; color:var(--sub); font-weight:600;}
  .stat-row .sv{text-align:right;}
  .stat-row .sv b{font-size:23px; font-weight:800; letter-spacing:-.03em;}
  .stat-row .sv .m{font-size:11px; font-weight:700; margin-top:2px;}
  .m.up{color:var(--good);} .m.down{color:var(--bad);} .m.flat{color:var(--light);}

  /* 키워드 경쟁 카드 */
  .kw-top{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px;}
  .kw-name{font-size:15px; font-weight:800; letter-spacing:-.02em;}
  .kw-sub{font-size:11px; color:var(--light); margin-top:2px;}
  .kw-cur{text-align:right; white-space:nowrap;}
  .kw-cur .big{font-size:25px; font-weight:800; letter-spacing:-.03em; line-height:1;}
  .kw-cur .big .u{font-size:13px; color:var(--light); margin-left:1px;}
  .kw-cur .big.out{font-size:14px; color:var(--light);}
  .kw-cur .dl{font-size:11px; font-weight:700; margin-top:5px;}
  .kw-cur .dl.up{color:var(--good);} .kw-cur .dl.down{color:var(--bad);} .kw-cur .dl.flat{color:var(--light);}

  /* 경쟁사 막대 랭킹 (db-rbar 스타일) */
  .rbar{display:flex; align-items:center; gap:11px; padding:7px 9px; margin:0 -9px; border-radius:10px; transition:background .13s;}
  .rbar + .rbar{margin-top:1px;}
  .rbar:hover{background:#f5f8f6;}
  .rbar.ours:hover{background:#e3f0e9;}
  .rbar .rno{width:20px; text-align:center; font-size:12.5px; font-weight:800; color:var(--light);}
  .rbar .rno.t{color:var(--gold);}
  .rbar .rnm{width:118px; font-size:12.5px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rbar .rtk{flex:1; height:11px; background:var(--input); border-radius:7px; overflow:hidden;}
  .rbar .rtk i{display:block; height:100%; border-radius:7px; background:linear-gradient(90deg,#d9b45e,var(--accent));}
  .rbar .rvl{width:38px; text-align:right; font-size:12.5px; font-weight:800; color:var(--sub);}
  .rbar.ours{background:var(--tint);}
  .rbar.ours .rnm{color:var(--green);}
  .rbar.ours .rno{color:var(--green);}
  .rbar.ours .rtk i{background:linear-gradient(90deg,var(--green),#0c5f44);}
  .rbar .tag{font-size:9.5px; font-weight:800; letter-spacing:.03em; color:var(--green); background:#fff;
    border:1px solid #cfe6dc; padding:2px 7px; border-radius:20px;}
  .rbar-cap{font-size:10px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--light); margin-bottom:9px;}
  .kw-empty{font-size:12.5px; color:var(--light); padding:16px 0;}

  /* 세팅 완성도 */
  .setup-score{display:flex; align-items:center; gap:16px; margin-bottom:15px;}
  .setup-score .pct{font-size:34px; font-weight:800; letter-spacing:-.03em; color:var(--green); line-height:1;}
  .setup-score .pct small{font-size:14px; color:var(--light); font-weight:700;}
  .setup-bar{flex:1; height:10px; background:var(--input); border-radius:6px; overflow:hidden;}
  .setup-bar i{display:block; height:100%; background:linear-gradient(90deg,var(--green),#0c5f44); border-radius:6px;}
  .check-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  @media(max-width:560px){ .check-grid{grid-template-columns:1fr;} }
  .chk{display:flex; align-items:center; gap:9px; font-size:13px; padding:9px 11px; border-radius:10px; background:#f7f9f8; transition:transform .12s, box-shadow .12s;}
  .chk:hover{transform:translateY(-2px); box-shadow:0 6px 14px rgba(40,50,40,.08);}
  .chk.on{color:var(--text);} .chk.off{color:var(--light);}
  .chk .mk{width:18px; height:18px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex:none; color:#fff;}
  .chk.on .mk{background:var(--green);} .chk.off .mk{background:#d7dcd8;}
  .rvkw{display:flex; flex-wrap:wrap; gap:7px; margin-top:6px;}
  .rvkw span{font-size:12px; color:var(--sub); background:#f4f6f5; border:1px solid var(--line); padding:4px 11px; border-radius:20px; transition:transform .12s, border-color .12s, color .12s;}
  .rvkw span:hover{transform:translateY(-2px); border-color:var(--green); color:var(--green);}

  /* 프로파일 비교표 */
  .ptbl{width:100%; border-collapse:collapse; font-size:12.8px; min-width:440px;}
  .ptbl th{font-size:10px; font-weight:700; letter-spacing:.04em; color:var(--light); text-transform:uppercase; text-align:right; padding:9px 8px; border-bottom:1px solid var(--border); white-space:nowrap;}
  .ptbl th:first-child{text-align:left;}
  .ptbl td{padding:11px 8px; border-bottom:1px solid var(--line); text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;}
  .ptbl td:first-child{text-align:left; font-weight:700;}
  .ptbl tr{transition:background .13s;}
  .ptbl tr:hover td{background:#f7faf8;}
  .ptbl tr.ours{background:var(--tint);}
  .ptbl tr.ours:hover td{background:#e3f0e9;}
  .ptbl tr.ours td:first-child{color:var(--green); font-weight:800;}
  .bchip{display:inline-block; font-size:10px; font-weight:800; padding:2px 6px; border-radius:6px; margin-left:3px;}
  .bchip.on{color:var(--green); background:var(--tint);} .bchip.off{color:#c3c8c4; background:#f3f5f4;}
  .star{font-size:11px; color:var(--gold); font-weight:800;}
  /* 경쟁 진단 — 비교 막대 */
  .diag-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;}
  .msr-badge{flex:none; font-size:10.5px; font-weight:700; color:var(--green); background:var(--tint);
    border:1px solid #d9e8e0; padding:5px 11px; border-radius:8px; letter-spacing:.02em; margin-top:2px;}
  .cmp-legend{display:flex; gap:16px; font-size:11.5px; color:var(--sub); font-weight:600; margin:13px 0 2px;}
  .cmp-legend .ck{display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:5px;}
  .ck.ours{background:#12805c;} .ck.comp{background:#8a978f;}
  .cmp-list{display:grid; grid-template-columns:1fr 1fr; gap:0 36px;}
  @media(max-width:760px){ .cmp-list{grid-template-columns:1fr;} }
  .cmp-row{padding:13px 0; border-bottom:1px solid var(--line);}
  .cmp-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:7px;}
  .cmp-l{font-size:13px; font-weight:700;}
  .delta{font-size:11px; font-weight:800; padding:3px 10px; border-radius:14px; white-space:nowrap;}
  .delta.up{color:var(--good); background:rgba(46,125,87,.1);}
  .delta.down{color:var(--bad); background:rgba(192,57,43,.08);}
  .cbar{display:flex; align-items:center; gap:9px; margin:4px 0;}
  .cbn{flex:none; width:54px; font-size:10.5px; font-weight:700; color:var(--light); text-align:right;}
  .ctrack{flex:1; height:14px; background:#f2f4f2; border-radius:4px; overflow:hidden;}
  .ctrack i{display:block; height:100%; border-radius:0 4px 4px 0; transition:width .5s ease;}
  .ctrack i.ours{background:#12805c;} .ctrack i.comp{background:#8a978f;}
  .cbv{flex:none; min-width:66px; font-size:12.3px; font-weight:800; color:var(--text);}
  .cta-wrap{margin-top:18px; padding:17px 19px; background:linear-gradient(135deg,#123d2e,#12805c);
    border-radius:14px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;}
  .cta-txt{color:#dcebe3; font-size:12.6px; line-height:1.65; flex:1; min-width:240px;}
  .cta-txt b{display:block; color:#fff; font-size:14.5px; margin-bottom:3px; letter-spacing:-.01em;}
  .cta-btn{flex:none; background:#fff; color:#12805c; font-weight:800; font-size:13.5px; padding:12px 24px;
    border-radius:11px; text-decoration:none; box-shadow:0 6px 16px rgba(0,0,0,.18); transition:transform .15s, box-shadow .15s;}
  .cta-btn:hover{transform:translateY(-2px); box-shadow:0 10px 22px rgba(0,0,0,.28);}
  .rkw-row{padding:11px 0; border-bottom:1px solid var(--line);}
  .rkw-row:last-child{border-bottom:none;}
  .rkw-row.ours{background:var(--tint); margin:0 -10px; padding:11px 10px; border-radius:12px; border-bottom:none;}
  .rkw-row .rkw-name{font-size:12.5px; font-weight:700; margin-bottom:7px;}
  .rkw-row.ours .rkw-name{color:var(--green); font-weight:800;}
  .rvkw span.common{background:var(--gold-s); border-color:var(--gold); color:#7a5a1c; font-weight:700;}

  /* 경쟁 진단 */
  .panel.diag{border-color:#e7dcc0; box-shadow:0 10px 26px rgba(150,120,40,.06);}
  .diag-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:6px;}
  @media(max-width:560px){ .diag-grid{grid-template-columns:1fr;} }
  .dg-h{font-size:10.5px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--line); color:var(--light);}
  .dg-h.win{color:var(--good);} .dg-h.lose{color:var(--bad);}
  .dg-row{display:flex; justify-content:space-between; align-items:baseline; gap:10px; padding:8px 2px; font-size:13px;}
  .dg-row .dl2{font-weight:700;} .dg-row .dv{font-size:12px; color:var(--sub); text-align:right; white-space:nowrap;}
  .dg-row .dv b{color:var(--text); font-variant-numeric:tabular-nums;}
  .dg-empty{font-size:12.5px; color:var(--light); padding:10px 2px;}
  .rx-wrap{margin-top:18px; border-top:1px solid var(--line); padding-top:15px;}
  .rx{display:flex; gap:11px; align-items:flex-start; font-size:13px; padding:7px 0; color:#3a463f; line-height:1.55;}
  .rx-n{flex:none; width:21px; height:21px; border-radius:7px; background:var(--gold-s); color:var(--gold); font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-top:1px;}

  /* KPI */
  .kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  @media(max-width:560px){ .kpis{grid-template-columns:1fr;} }
  .kpi{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px 18px 16px;
    box-shadow:0 10px 26px rgba(40,50,40,.05); transition:transform .15s, box-shadow .15s;}
  .kpi:hover{transform:translateY(-3px); box-shadow:0 16px 32px rgba(40,50,40,.1);}
  .kpi .l{font-size:10.5px; color:var(--light); font-weight:700; letter-spacing:.06em; text-transform:uppercase;}
  .kpi .v{font-size:28px; font-weight:800; letter-spacing:-.03em; margin-top:8px; line-height:1;}

  .kpi .d.up{color:var(--good);} .kpi .d.down{color:var(--bad);} .kpi .d.flat{color:var(--light);}

  .work{white-space:pre-wrap; font-size:13.6px; color:#3a463f; line-height:1.72;}

<body>
<div class="wrap" id="wrap"><div class="load" id="load">리포트 불러오는 중…</div></div>

<script>
const SB='https://enqsuymbsugrkmstewek.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVucXN1eW1ic3Vncmttc3Rld2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDg1MzQsImV4cCI6MjA5ODQyNDUzNH0.LsVx4Eob26nBQ_sD_VjFoSXPgIQcTTaNSql48gdvgLM';
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const token=new URLSearchParams(location.search).get('t');
const fmtN=n=>Number(n||0).toLocaleString('ko-KR');
const mdShort=d=>{const p=d.split('-'); return `${+p[1]}.${+p[2]}`;};
const PALETTE=['#12805c','#c79a3a','#3a6ea5','#9a5b12','#2e7d57'];

function showErr(t,m){ document.getElementById('wrap').innerHTML=`<div class="err"><div class="t">${esc(t)}</div>${esc(m||'')}</div>`; }

async function load(){
  if(!token){ showErr('리포트를 열 수 없습니다','링크 주소를 다시 확인해주세요.'); return; }
  try{
    const res=await fetch(SB+'/rest/v1/rpc/place_report_public',{method:'POST',
      headers:{'apikey':ANON,'Authorization':'Bearer '+ANON,'Content-Type':'application/json'},

    render(data);
  }catch(e){ showErr('불러오기 오류', e.message); }
}

function groupByKeyword(ranks){
  const m={};
  ranks.forEach(r=>{ (m[r.keyword]=m[r.keyword]||[]).push(r); });
  Object.values(m).forEach(a=>a.sort((x,y)=>x.checked_on<y.checked_on?-1:1));
  return m;
}
const latestRank=s=>{ const p=s.filter(x=>x.rank!=null); return p.length?p[p.length-1].rank:null; };
function firstLast(s){ const p=s.filter(x=>x.rank!=null); return p.length<2?null:{first:p[0].rank,last:p[p.length-1].rank}; }

// 경쟁사 막대 (fuller = 상위). 최신 top_list 사용.
function topsBars(series){
  let latest=null;
  for(let i=series.length-1;i>=0;i--){ const tl=series[i].top_list; if(tl&&tl.length){ latest={date:series[i].checked_on,list:tl}; break; } }
  if(!latest) return '';
  const full=latest.list.slice().sort((a,b)=>(a.rank||0)-(b.rank||0));
  const ours=full.find(e=>e.ours);
  let list=full.slice(0,9);
  if(ours && !list.some(e=>e.ours)) list.push(ours);   // 우리 행은 TOP 밖이어도 항상 표시
  const maxR=Math.max(...list.map(e=>e.rank||1));
  const rows=list.map(e=>{
    const w=Math.max(8, Math.round(((maxR+1-(e.rank||maxR))/maxR)*100));
    const ours=!!e.ours;
    return `<div class="rbar${ours?' ours':''}">
      <span class="rno${e.rank<=3?' t':''} num">${e.rank}</span>
      <span class="rnm">${esc(e.name)}</span>
      <span class="rtk"><i style="width:${w}%"></i></span>
      ${ours?'<span class="tag">우리</span>':`<span class="rvl num">${e.rank}위</span>`}</div>`;
  }).join('');
  return `<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:13px;">
    <div class="rbar-cap">상위 노출 업체 · ${mdShort(latest.date)} 기준</div>${rows}</div>`;
}

function momTxt(cur,prev,cls){
  if(prev==null||prev===0) return '';
  const p=Math.round(((cur-prev)/prev)*100);
  if(p>0) return `<div class="${cls} up num">▲ +${p}% <span style="font-weight:600">전월</span></div>`;
  if(p<0) return `<div class="${cls} down num">▼ ${p}% <span style="font-weight:600">전월</span></div>`;
  return `<div class="${cls} flat">전월과 동일</div>`;
}

// 세팅 완성도 (우리 프로파일)
function setupPanel(ours){
  if(!ours) return '';
  const items=[
    {on: ours.has_booking, l:'예약 버튼'},
    {on: ours.has_talk, l:'톡톡 상담'},
    {on: ours.news_days!=null && ours.news_days<=30, l:'최근 소식(30일 내)'},
    {on: (ours.photos||0)>=10, l:'대표 사진 10장 이상'},
    {on: (ours.reply_rate||0)>=50, l:'리뷰 답변 활발'},
    {on: !!(ours.rep_keywords&&ours.rep_keywords.length), l:'대표키워드 세팅'},
  ];
  if(ours.has_coupon) items.push({on:true, l:'쿠폰 발급'});   // 쿠폰=자동측정 안 함 → 확인된 경우만 표시
  const done=items.filter(i=>i.on).length, pct=Math.round(done/items.length*100);
  const grid=items.map(i=>`<div class="chk ${i.on?'on':'off'}"><span class="mk">${i.on?'✓':'!'}</span>${esc(i.l)}</div>`).join('');
  const kw=(ours.review_keywords&&ours.review_keywords.length)
    ? `<div style="margin-top:16px"><div class="rbar-cap">방문 특성 키워드 (최근 리뷰에서 손님이 남긴 예약·대기 정보)</div><div class="rvkw">${ours.review_keywords.map(k=>`<span>${esc(k)}</span>`).join('')}</div></div>` : '';
  return `<div class="panel"><h3>플레이스 세팅 완성도</h3><div class="psub">순위에 직접 영향을 주는 세팅 항목 점검 · 채울수록 상위노출에 유리</div>
    <div class="setup-score"><div class="pct num">${pct}<small>%</small></div><div class="setup-bar"><i style="width:${pct}%"></i></div></div>
    <div class="check-grid">${grid}</div>${kw}</div>`;
}
// 경쟁사 프로파일 비교표
function profilePanel(profiles){
  if(!profiles.length) return '';
  const bt=(on,t)=>`<span class="bchip ${on?'on':'off'}">${t}</span>`;
  const rows=profiles.map(p=>{
    const nd = p.news_days==null?'-':`${p.news_days}일 전`;
    const star = p.review_score>0?` <span class="star num">★${p.review_score}</span>`:'';
    return `<tr class="${p.is_ours?'ours':''}">
      <td>${esc(p.subject)}${p.is_ours?' · 우리':''}${star}</td>
      <td>${p.visitor_reviews==null?'-':fmtN(p.visitor_reviews)}</td>
      <td>${p.blog_reviews==null?'-':fmtN(p.blog_reviews)}</td>
      <td>${p.reply_rate==null?'-':p.reply_rate+'%'}</td>
      <td>${p.reviews_per_week==null?'-':'주 '+p.reviews_per_week+'건'}</td>
      <td>${nd}</td>
      <td>${bt(p.has_booking,'예약')}${bt(p.has_talk,'톡톡')}${p.has_coupon?bt(true,'쿠폰'):''}</td>
    </tr>`;
  }).join('');
  return `<div class="panel"><h3>경쟁사 프로파일 비교</h3><div class="psub">상위 노출 업체와 리뷰·세팅을 나란히 · 방문자리뷰=영수증 인증 · 답변율·리뷰 유입=최근 리뷰 표본 기준</div>
    <div style="overflow-x:auto"><table class="ptbl">
      <tr><th>업체</th><th>방문자리뷰</th><th>블로그리뷰</th><th>답변율</th><th>리뷰 유입</th><th>최근소식</th><th>버튼</th></tr>
      ${rows}</table></div></div>`;
}

// 대표키워드 전략 비교 — 각 업체가 스마트플레이스에 직접 세팅한 검색 키워드
function repKwPanel(profiles){
  const withKw=profiles.filter(p=>p.rep_keywords&&p.rep_keywords.length);
  if(!withKw.length) return '';
  const cnt={};
  withKw.forEach(p=>[...new Set(p.rep_keywords)].forEach(k=>cnt[k]=(cnt[k]||0)+1));
  const rows=withKw.map(p=>`<div class="rkw-row${p.is_ours?' ours':''}">
      <div class="rkw-name">${esc(p.subject)}${p.is_ours?' · 우리':''}</div>
      <div class="rvkw">${p.rep_keywords.map(k=>`<span class="${cnt[k]>=2?'common':''}">${esc(k)}</span>`).join('')}</div>
    </div>`).join('');
  return `<div class="panel"><h3>대표키워드 전략 비교</h3>
    <div class="psub">각 업체가 스마트플레이스에 직접 세팅한 검색 키워드 · <b>금색 칩 = 2곳 이상 공통(시장 필수 키워드)</b> · 나머지 = 그 업체의 차별화 키워드</div>
    ${rows}</div>`;
}

// 경쟁 진단 — 우리 vs 경쟁사 평균, 강점/약점 + 처방
function diagnosisPanel(profiles){
  const ours=profiles.find(x=>x.is_ours), comps=profiles.filter(x=>!x.is_ours);
  if(!ours || !comps.length) return '';
  const avg=arr=>{arr=arr.filter(v=>v!=null); return arr.length? arr.reduce((a,b)=>a+b,0)/arr.length : null;};
  const metrics=[
    {l:'방문자 리뷰', unit:'', better:'high', ours:ours.visitor_reviews, comp:avg(comps.map(c=>c.visitor_reviews)),
      rx:'방문자(영수증) 리뷰가 부족해요. 리뷰 이벤트(QR·문구)로 늘리세요'},
    {l:'블로그 리뷰', unit:'', better:'high', ours:ours.blog_reviews, comp:avg(comps.map(c=>c.blog_reviews)),
      rx:'블로그 리뷰가 부족해요. 블로그 발행을 늘려 노출을 넓히세요 (BlogStudio 대행)'},
    {l:'리뷰 답변율', unit:'%', better:'high', ours:ours.reply_rate, comp:avg(comps.map(c=>c.reply_rate)),
      rx:'리뷰 답변율이 낮아요. 리뷰마다 답글을 달아 관리 신호를 높이세요'},
    {l:'리뷰 유입 속도', unit:'건/주', better:'high', ours:ours.reviews_per_week, comp:avg(comps.map(c=>c.reviews_per_week)),
      rx:'최근 리뷰 유입이 경쟁사보다 느려요. 매장 내 리뷰 유도(QR·안내문구)로 속도를 높이세요'},
    {l:'소식 최신성', unit:'일 전', better:'low', ours:ours.news_days, comp:avg(comps.map(c=>c.news_days)),
      rx:'소식이 뜸해요. 주 1회 소식으로 "관리되는 플레이스" 신호를 유지하세요'},
  ];
  const rows=[], rx=[];
  metrics.forEach(m=>{
    if(m.ours==null||m.comp==null) return;
    const better = m.better==='high' ? m.ours>=m.comp : m.ours<=m.comp;
    if(!better) rx.push(m.rx);
    const pct=(m.better==='high'&&m.comp)?Math.round(Math.abs(m.ours-m.comp)/m.comp*100):null;
    const chip= better?`<span class="delta up">▲ ${pct!=null?pct+'% ':''}앞서요</span>`
                      :`<span class="delta down">▼ ${pct!=null?pct+'% ':''}부족해요</span>`;
    const compDisp = m.unit==='건/주' ? Math.round(m.comp*10)/10 : Math.round(m.comp);
    const max=Math.max(m.ours,compDisp)||1;
    const bar=(cls,nm,v)=>`<div class="cbar" title="${esc(m.l)} · ${nm} ${fmtN(v)}${m.unit}">
        <span class="cbn">${nm}</span>
        <div class="ctrack"><i class="${cls}" style="width:${Math.max(4,Math.round(v/max*100))}%"></i></div>
        <span class="cbv num">${fmtN(v)}${m.unit}</span></div>`;
    rows.push({better, html:`<div class="cmp-row">
        <div class="cmp-top"><span class="cmp-l">${esc(m.l)}</span>${chip}</div>
        ${bar('ours','우리',m.ours)}${bar('comp','경쟁 평균',compDisp)}</div>`});
  });
  rows.sort((a,b)=>(a.better?1:0)-(b.better?1:0));   // 뒤처지는 지표 먼저
  // 세팅 부족 → 처방 추가
  if(!ours.has_booking) rx.push('예약 버튼이 없어요. 예약 연동을 켜면 전환·순위에 유리해요');
  if(!ours.has_talk)    rx.push('톡톡이 연결 안 됐어요. 문의 응대 채널을 켜세요');
  if((ours.photos||0)<10) rx.push('대표 사진이 부족해요(10장 미만). 사진을 보강하세요');
  if(!ours.rep_keywords||!ours.rep_keywords.length) rx.push('플레이스 대표키워드가 비어 있어요. 손님이 실제 검색하는 단어 5개로 채우세요');

  if(!rows.length && !rx.length) return '';
  const rxH = rx.length? rx.map((t,i)=>`<div class="rx"><span class="rx-n num">${i+1}</span>${esc(t)}</div>`).join('')
                       : '<div class="dg-empty">지금 아주 잘 하고 있어요 👍 이 페이스를 유지하세요.</div>';
  const badge=`네이버 플레이스 실측 · ${esc((ours.checked_on||'').replace(/-/g,'.'))} · 상위 ${comps.length}개 업체 평균과 비교`;
  return `<div class="panel diag">
    <div class="diag-head">
      <div><h3>경쟁 진단 · 우리 vs 상위 경쟁사</h3>
        <div class="psub">뒤처지는 지표부터 · 아래 처방으로 연결됩니다</div></div>
      <div class="msr-badge">${badge}</div>
    </div>
    <div class="cmp-legend"><span><span class="ck ours"></span>우리</span><span><span class="ck comp"></span>경쟁 상위 평균</span></div>
    <div class="cmp-list">${rows.map(r=>r.html).join('')}</div>
    <div class="rx-wrap"><div class="dg-h">이번 달 처방 (할 일)</div>${rxH}</div>
    <div class="cta-wrap">
      <div class="cta-txt"><b>이 처방, BlogStudio가 대신 해드립니다</b>
        상권 데이터 기반 블로그 원고 작성·발행부터 플레이스 관리까지 — 다음 달 리포트에서 변화를 숫자로 확인하세요.</div>
      <a class="cta-btn" href="https://blogstudio.kr/order.html?ref=report&t=${encodeURIComponent(token)}" target="_blank" rel="noopener">원고 주문하기 →</a>
    </div>
  </div>`;
}

// 스마트플레이스 통계 패널 (세로 스택)
function statPanel(lastM,prevM){
  if(!lastM) return '';
  const st=lastM.stats||{}, pst=(prevM&&prevM.stats)||{};
  const row=(l,c,pv)=>`<div class="stat-row"><div class="sl">${esc(l)}</div><div class="sv"><b class="num">${fmtN(c)}</b>${momTxt(c,pv,'m')}</div></div>`;
  return `<div class="panel"><h3>스마트플레이스 통계</h3><div class="psub">${esc(lastM.ym)} · 전월 대비</div>`
    + row('플레이스 조회수',st.views,pst.views)
    + row('방문 유입',st.visits,pst.visits)
    + row('예약·전화·길찾기',st.reserve_clicks,pst.reserve_clicks)
    + `</div>`;
}
// 키워드 경쟁 카드 (순위 + 상위 업체 막대)
function keywordCard(kw, s){
  const nowR=latestRank(s), fl=firstLast(s);
  let vol=null; for(let i=s.length-1;i>=0;i--){ if(s[i].search_volume!=null){ vol=s[i].search_volume; break; } }
  let dl=''; if(fl){ const diff=fl.first-fl.last;
    dl = diff>0?`<div class="dl up num">${fl.first}위 → ${diff}계단 상승</div>`
       : diff<0?`<div class="dl down num">${fl.first}위 → ${-diff}계단 하락</div>`
       : `<div class="dl flat">순위 유지</div>`; }
  const cur = nowR!=null?`<div class="big num">${nowR}<span class="u">위</span></div>`:`<div class="big out">순위권 밖</div>`;
  return `<div class="panel"><div class="kw-top">
      <div><div class="kw-name">${esc(kw)}</div><div class="kw-sub">네이버 통합검색${vol!=null?` · 한 달에 <b class="num">${fmtN(vol)}</b>번 검색되는 키워드`:''}</div></div>
      <div class="kw-cur">${cur}${dl}</div>
    </div>${topsBars(s)||'<div class="kw-empty">상위 업체 데이터가 아직 없습니다.</div>'}</div>`;
}
// 2개 패널을 나란히 (빈 건 제외, 1개면 단독)
function dashRow(cls, a, b){
  const ps=[a,b].filter(x=>x&&x.trim());
  if(!ps.length) return '';
  if(ps.length===1) return ps[0];
  return `<div class="dash ${cls}">${ps.join('')}</div>`;
}

// 네이버 실제 검색 화면 (proof) — 왼쪽=실제 화면 / 오른쪽=그 화면을 순위표로 정리.
// screenshot_url 있는 키워드만. 없으면 '' (섹션 생략).
function _nkey(s){ return (s||'').replace(/\s+/g,'').toLowerCase(); }
function searchProofSection(place, groups, kws, profiles){
  // 업체명 → 프로파일(리뷰수) 매핑
  const profByKey={};
  (profiles||[]).forEach(pr=>{ profByKey[_nkey(pr.subject)]=pr; });
  const lookupProf=(name)=>{
    const k=_nkey(name);
    if(profByKey[k]) return profByKey[k];
    for(const pk in profByKey){ if(pk&&(pk.includes(k)||k.includes(pk))) return profByKey[pk]; }
    return null;
  };
  const cards=[];
  kws.forEach(kw=>{
    const series=groups[kw]||[];
    const shots=series.filter(x=>x.screenshot_url);
    if(!shots.length) return;                     // 캡차/미측정 → 이 키워드는 표시 안 함
    const shot=shots[shots.length-1];             // 최신 캡처
    const rk=latestRank(series);
    const dt=(shot.checked_on||'').replace(/-/g,'.');
    const basis=(place.region?`가게 위치(${esc(place.region)}) 기준 · `:'')+dt+' 캡처';
    const rankHtml = rk!=null ? `<div class="proof-rank"><b>${rk}</b><span>위</span></div>`
                              : `<div class="proof-rank out"><b>순위권 밖</b></div>`;
    // 오른쪽 데이터 = 최신 top_list(광고 제외 오가닉) + 리뷰수 조인 + 블로그 리뷰 막대(격차)
    // 데이터 소스: screen_list(화면 순서 그대로 · 광고 포함) 우선, 없으면 top_list(오가닉만) 폴백.
    const useScreen = (shot.screen_list && shot.screen_list.length);
    const list = useScreen ? shot.screen_list.slice(0,10)
                           : (shot.top_list||[]).slice(0,8).map(e=>({...e, ad:false}));
    // 리뷰 수: 항목 자체 값 우선(화면과 같은 순간), 없으면 place_profiles 폴백.
    const blogOf=(e)=>{ if(e.blog_reviews!=null) return Number(e.blog_reviews);
      const pr=lookupProf(e.name); return pr&&pr.blog_reviews!=null?Number(pr.blog_reviews):null; };
    const visitOf=(e)=>{ if(e.visitor_reviews!=null) return Number(e.visitor_reviews);
      const pr=lookupProf(e.name); return pr&&pr.visitor_reviews!=null?Number(pr.visitor_reviews):null; };
    const maxBlog=Math.max(1, ...list.filter(e=>!e.ad).map(e=>blogOf(e)||0));
    // 같은 가게가 광고+오가닉 두 번 등장하는 혼동 방지: 광고행에 실제 순위를 병기
    const organicRank={};
    list.filter(e=>!e.ad).forEach(e=>{ const k=_nkey(e.name); if(organicRank[k]==null) organicRank[k]=e.rank; });
    const adCount=list.filter(e=>e.ad).length;
    let organicStarted=false;
    const rows=list.map(e=>{
      if(e.ad){
        const realRk=organicRank[_nkey(e.name)];
        return `<li class="ad"><span class="pd-r ad">AD</span>
          <span class="pd-nm">${esc(e.name)}<span class="pd-adtag">광고</span></span>
          <span class="pd-adnote">${realRk?`광고비로 상단 노출 · 실제 ${realRk}위`:'광고 자리'}</span></li>`;
      }
      let divider='';
      if(useScreen && !organicStarted){ organicStarted=true; divider=`<li class="pd-divider">↓ 광고 아래 · 실제(오가닉) 순위</li>`; }
      const blog=blogOf(e), visit=visitOf(e);
      const metric = blog!=null
        ? `<span class="pd-metric"><span class="pd-track"><span class="pd-fill${e.ours?' mine':''}" style="width:${Math.max(5,Math.round(blog/maxBlog*100))}%"></span></span>
             <span class="pd-mval">${blog.toLocaleString()}<span class="u"> 블로그</span></span></span>
           <span class="pd-visit">방문 ${visit!=null?visit.toLocaleString():'-'}</span>`
        : `<span class="pd-empty">리뷰 데이터 준비 중</span>`;
      return `${divider}<li class="${e.ours?'ours':''}"><span class="pd-r${e.rank<=3?' top':''}">${e.rank}</span>
        <span class="pd-nm">${esc(e.name)}${e.ours?'<span class="pd-me">우리</span>':''}</span>
        ${metric}</li>`;
    }).join('');
    const dataPanel = rows ? `<div class="proof-data">
        <div class="pd-title">이 화면을 순위표로 정리하면</div>
        <div class="pd-sub">광고 제외 실제(오가닉) 순위 · 막대 = 블로그 리뷰 수(1위 대비) · <b style="color:var(--gold)">블로그 리뷰는 저희가 늘려드리는 지표</b></div>
        <ol class="pd-list">${rows}</ol>
        <a class="proof-verify" href="https://search.naver.com/search.naver?query=${encodeURIComponent(kw)}" target="_blank" rel="noopener">👉 네이버에서 '${esc(kw)}' 직접 검색해 확인하기</a>
      </div>` : '';
    cards.push(`<div class="panel proof-card">
      <div class="proof-head"><div>
        <div class="proof-qlabel">네이버에 이렇게 검색했습니다</div>
        <div class="proof-kw"><span class="mag">🔍</span>${esc(kw)}</div>
        <div class="proof-basis">${basis}</div></div>${rankHtml}</div>
      <div class="proof-body">
        <div class="phone">${adCount?`<div class="phone-adwarn">⚠️ 화면 맨 위 <b>${adCount}개</b>는 '광고ⓘ' — 실제 순위는 그 아래부터</div>`:''}<img src="${esc(shot.screenshot_url)}" alt="네이버 '${esc(kw)}' 검색 화면" loading="lazy">
          <div class="phone-hint">${adCount?`위 ${adCount}개는 광고 · 스크롤하면 실제 순위가 보입니다`:'스크롤하면 순위 목록이 보입니다'}</div></div>
        ${dataPanel}
      </div>
      <div class="proof-note">※ 화면 맨 위 <b>'광고ⓘ'</b> 표시 항목은 광고 자리입니다. 오른쪽 순위표는 광고를 뺀 <b>실제(오가닉) 순위</b>이며, <b>가게 위치 기준</b>으로 저희가 직접 측정했습니다. 네이버 결과는 보는 위치·시점에 따라 조금씩 달라질 수 있습니다.</div>
    </div>`);
  });
  if(!cards.length) return '';
  return `<div class="sec"><h2>네이버 실제 검색 화면</h2><div class="ln"></div></div>
    <div class="proof-intro">숫자로만 말씀드리지 않습니다. <b>왼쪽은 실제로 네이버에서 검색해 캡처한 화면</b>, <b>오른쪽은 그 화면을 순위표로 정리</b>한 것입니다 — 지금 사장님이 직접 검색해 대조해 보실 수 있습니다.</div>
    ${cards.join('')}`;
}

let chartRef=null;
function render(d){
  const p=d.place||{}, ranks=d.ranks||[], months=d.months||[];
  const groups=groupByKeyword(ranks);
  const kws=(p.target_keywords&&p.target_keywords.length? p.target_keywords.filter(k=>groups[k]) : Object.keys(groups));
  const allDates=[...new Set(ranks.map(r=>r.checked_on))].sort();
  const period=allDates.length?`${allDates[0].replace(/-/g,'.')} — ${allDates[allDates.length-1].replace(/-/g,'.')}`:'';

  // 요약 지표
  const latests=kws.map(k=>latestRank(groups[k])).filter(v=>v!=null);
  const avgRank=latests.length?(latests.reduce((a,b)=>a+b,0)/latests.length):null;
  let improved=0; kws.forEach(k=>{ const fl=firstLast(groups[k]); if(fl && fl.first-fl.last>0) improved++; });
  const lastM=months[months.length-1], prevM=months.length>1?months[months.length-2]:null;
  const vNow=(lastM&&lastM.stats||{}).views, vPrev=(prevM&&prevM.stats||{}).views;
  const vGrow=(vPrev)?Math.round(((vNow-vPrev)/vPrev)*100):null;

  let h='';
  h+=`<div class="topbar"><div class="brand">Blog<span>Studio</span></div>
      <div class="period">${period?('측정기간 '+period):''}</div></div>`;
  h+=`<div class="banner"><div class="eyebrow">Monthly Place Ranking Report</div>
      <h1>${esc(p.name||'')}</h1>
      <div class="meta">${[p.region,p.biztype].filter(Boolean).map(esc).map(x=>'<b>'+x+'</b>').join('  ·  ')}</div>
      <div class="chips">
        <div class="chip"><div class="v num">${avgRank!=null?avgRank.toFixed(1):'—'}<small>위</small></div><div class="l">타겟 키워드 평균 순위</div></div>
        <div class="chip"><div class="v num"><span class="gold">${improved}</span> / ${kws.length}</div><div class="l">순위 상승 키워드</div></div>
        <div class="chip"><div class="v num">${vGrow!=null?(vGrow>=0?'+':'')+vGrow+'%':'—'}</div><div class="l">플레이스 조회수 성장</div></div>
      </div></div>`;
  h+=`<div class="honest"><b>정직하게 알려드립니다.</b> 네이버 순위는 알고리즘과 경쟁 상황에 따라 늘 변동합니다.
      특정 순위를 보장하지 않으며, 실제 측정한 순위 추이와 유입 성장을 있는 그대로 보여드립니다.</div>`;

  // 네이버 실제 검색 화면 (proof — 데이터 정확성 시각 증명)
  const proof=searchProofSection(p, groups, kws, d.profiles||[]);
  if(proof) h+=`<div style="margin-top:16px">${proof}</div>`;

  // 경쟁 진단 (요약 처방 — 맨 위)
  const diag=diagnosisPanel(d.profiles||[]);
  if(diag) h+=`<div style="margin:16px 0;">${diag}</div>`;

  // ── 대시보드 그리드 (패널 좌우 배치) ──
  // Row A: 순위 추이 차트 | 스마트플레이스 통계
  const dayNote = allDates.length<2
    ? ` · <b style="color:var(--gold)">측정 1일차</b> — 매일 수집되면 순위 변화가 선으로 그려집니다`
    : ` · 측정 ${allDates.length}일치`;
  const chartPanel = kws.length
    ? `<div class="panel"><h3>키워드 순위 추이</h3><div class="psub">낮을수록 상위 · ${esc(period)}${dayNote}</div><div class="chartwrap"><canvas id="trend"></canvas></div></div>`
    : `<div class="panel"><h3>키워드 순위 추이</h3><div class="kw-empty">아직 측정된 순위 데이터가 없습니다.</div></div>`;
  h+=dashRow('a', chartPanel, statPanel(lastM,prevM));

  // Row B: 세팅 완성도 | 경쟁사 프로파일 비교
  const profiles=d.profiles||[];
  const oursP=profiles.find(x=>x.is_ours);
  h+=dashRow('b', setupPanel(oursP), profilePanel(profiles));

  // 대표키워드 전략 비교 (전체 폭)
  const rkw=repKwPanel(profiles);
  if(rkw) h+=`<div style="margin-top:16px">${rkw}</div>`;

  // 키워드별 경쟁 현황 (2단 카드)
  if(kws.length){
    h+=`<div class="sec"><h2>키워드별 경쟁 현황</h2><div class="ln"></div></div>`;
    h+=`<div class="dash k">`+kws.map(kw=>keywordCard(kw, groups[kw])).join('')+`</div>`;
  }

  // 이번 기간에 한 일 (2단)
  const withWork=months.filter(m=>m.work_done&&m.work_done.trim());
  if(withWork.length){
    h+=`<div class="sec"><h2>이번 기간에 한 일</h2><div class="ln"></div></div>`;
    const cards=withWork.slice().reverse().map(m=>`<div class="panel"><div class="mtag num">${esc(m.ym)}</div><div class="work">${esc(m.work_done)}</div></div>`);
    h+= cards.length>1 ? `<div class="dash k">`+cards.join('')+`</div>` : cards[0];
  }

  h+=`<div class="foot"><div class="fm">Blog<span>Studio</span></div>정직하게, 숫자로 증명하는 플레이스 관리<br>본 리포트는 실제 측정 데이터로 작성되었습니다.</div>`;

  document.getElementById('wrap').innerHTML=h;
  if(kws.length) drawTrend(kws, groups, allDates);
}

function drawTrend(kws, groups, dates){
  const ctx=document.getElementById('trend'); if(!ctx||!window.Chart) return;
  const datasets=kws.map((kw,i)=>{
    const c=PALETTE[i%PALETTE.length];
    const byDate={}; groups[kw].forEach(r=>byDate[r.checked_on]=r.rank);
    return { label:kw, data:dates.map(d=>byDate[d]==null?null:byDate[d]),
      borderColor:c, backgroundColor:c, tension:.35, borderWidth:2.6,
      pointRadius:3, pointHoverRadius:5, pointBackgroundColor:'#fff', pointBorderColor:c, pointBorderWidth:2,
      spanGaps:true };
  });
  chartRef=new Chart(ctx,{ type:'line',
    data:{ labels:dates.map(mdShort), datasets },
    options:{
      maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      layout:{padding:{top:8,right:8}},
      plugins:{
        legend:{position:'top', align:'start', labels:{boxWidth:9,boxHeight:9,usePointStyle:true,pointStyle:'circle',
          font:{family:"'Pretendard'",size:12,weight:'600'}, color:'#4b5a52', padding:16}},
        tooltip:{backgroundColor:'#123d2e', padding:11, cornerRadius:9, titleFont:{family:"'Pretendard'",size:12},
          bodyFont:{family:"'Pretendard'",size:12.5,weight:'600'}, displayColors:true, usePointStyle:true,
          callbacks:{ label:c=> ` ${c.dataset.label}: ${c.parsed.y==null?'순위밖':c.parsed.y+'위'}` }}
      },
      scales:{
        y:{ reverse:true, min:1, grid:{color:'#eceae1'}, border:{display:false},
          ticks:{stepSize:5, font:{family:"'Pretendard'",size:11}, color:'#9aa79e', callback:v=>v<1?'':v+'위', padding:8} },
        x:{ grid:{display:false}, border:{color:'#e5e1d6'},
          ticks:{font:{family:"'Pretendard'",size:11}, color:'#9aa79e', padding:6} }
      }
    }
  });
}
load();
</script>
</body>
</html>
