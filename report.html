<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>월간 순위 리포트 · BlogStudio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --primary:#123d2e; --primary-d:#0d2c22; --green:#12805c; --accent:#3a6ea5;
    --gold:#c79a3a; --gold-s:rgba(199,154,58,.14);
    --bg:#f7f6f1; --card:#fff; --input:#f0efeb;
    --text:#16231d; --sub:#4b5a52; --light:#7c8a82; --border:#e5e1d6;
    --good:#2e7d57; --bad:#c0392b; --tint:#edf5f1;
    --sans:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--sans); background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased; letter-spacing:-.02em; line-height:1.6;}
  .num{font-variant-numeric:tabular-nums;}
  .wrap{max-width:860px; margin:0 auto; padding:26px 18px 80px;}

  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .brand{font-size:15px; font-weight:800; letter-spacing:-.3px;} .brand span{color:var(--green);}
  .topbar .period{font-size:11.5px; color:var(--light); font-weight:600; letter-spacing:.02em;}

  /* 배너 히어로 (panze 스타일) */
  .banner{background:linear-gradient(120deg,#123d2e,#164a37 46%,#0d2c22); color:#fff;
    border-radius:22px; padding:26px 28px; position:relative; overflow:hidden;
    box-shadow:0 16px 40px rgba(18,61,46,.22);}
  .banner::after{content:''; position:absolute; right:-50px; top:-70px; width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle at 34% 34%, rgba(199,154,58,.32), rgba(199,154,58,.06) 58%, transparent 70%); pointer-events:none;}
  .banner>*{position:relative; z-index:1;}
  .eyebrow{font-size:10.5px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:#e7cf95; margin-bottom:12px;}
  .banner h1{font-size:28px; font-weight:800; letter-spacing:-.035em; line-height:1.15;}
  .banner .meta{margin-top:8px; font-size:13px; color:#c2d0c9;}
  .banner .meta b{color:#e6ede9; font-weight:600;}
  .chips{display:flex; gap:11px; margin-top:20px; flex-wrap:wrap;}
  .chip{flex:1; min-width:150px; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.14);
    border-radius:15px; padding:14px 16px; backdrop-filter:blur(2px);}
  .chip .v{font-size:22px; font-weight:800; letter-spacing:-.02em; line-height:1;}
  .chip .v small{font-size:12px; font-weight:700; color:#8fe0bd; margin-left:4px; letter-spacing:0;}
  .chip .v .gold{color:#e7cf95;}
  .chip .l{font-size:11px; color:#a9b8b0; margin-top:7px; letter-spacing:.01em;}

  .honest{font-size:12.2px; color:var(--sub); line-height:1.6; margin:16px 4px 0;}
  .honest b{color:var(--text); font-weight:700;}

  .sec{display:flex; align-items:baseline; gap:10px; margin:34px 4px 14px;}
  .sec h2{font-size:11.5px; font-weight:800; letter-spacing:.13em; text-transform:uppercase; color:var(--primary);}
  .sec .ln{flex:1; height:1px; background:var(--border);}
  .sec .agg{font-size:11.5px; color:var(--light); font-weight:600;}

  .panel{background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px 22px;
    box-shadow:0 10px 26px rgba(40,50,40,.05); margin-bottom:14px; transition:box-shadow .15s, transform .15s;}
  .panel:hover{box-shadow:0 14px 32px rgba(40,50,40,.09);}
  .panel h3{font-size:14.5px; font-weight:800; letter-spacing:-.02em; margin-bottom:2px;}
  .panel .psub{font-size:11.5px; color:var(--light); margin-bottom:14px;}
  .chartwrap{height:280px; position:relative;}

  /* 키워드 경쟁 카드 */
  .kw-top{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px;}
  .kw-name{font-size:15px; font-weight:800; letter-spacing:-.02em;}
  .kw-sub{font-size:11px; color:var(--light); margin-top:2px;}
  .kw-cur{text-align:right; white-space:nowrap;}
  .kw-cur .big{font-size:25px; font-weight:800; letter-spacing:-.03em; line-height:1;}
  .kw-cur .big .u{font-size:13px; color:var(--light); margin-left:1px;}
  .kw-cur .big.out{font-size:14px; color:var(--light);}
  .kw-cur .dl{font-size:11px; font-weight:700; margin-top:5px;}
  .kw-cur .dl.up{color:var(--good);} .kw-cur .dl.down{color:var(--bad);} .kw-cur .dl.flat{color:var(--light);}

  /* 경쟁사 막대 랭킹 (db-rbar 스타일) */
  .rbar{display:flex; align-items:center; gap:11px; padding:7px 9px; margin:0 -9px; border-radius:10px;}
  .rbar + .rbar{margin-top:1px;}
  .rbar .rno{width:20px; text-align:center; font-size:12.5px; font-weight:800; color:var(--light);}
  .rbar .rno.t{color:var(--gold);}
  .rbar .rnm{width:118px; font-size:12.5px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rbar .rtk{flex:1; height:11px; background:var(--input); border-radius:7px; overflow:hidden;}
  .rbar .rtk i{display:block; height:100%; border-radius:7px; background:linear-gradient(90deg,#d9b45e,var(--accent));}
  .rbar .rvl{width:38px; text-align:right; font-size:12.5px; font-weight:800; color:var(--sub);}
  .rbar.ours{background:var(--tint);}
  .rbar.ours .rnm{color:var(--green);}
  .rbar.ours .rno{color:var(--green);}
  .rbar.ours .rtk i{background:linear-gradient(90deg,var(--green),#0c5f44);}
  .rbar .tag{font-size:9.5px; font-weight:800; letter-spacing:.03em; color:var(--green); background:#fff;
    border:1px solid #cfe6dc; padding:2px 7px; border-radius:20px;}
  .rbar-cap{font-size:10px; font-weight:800; letter-spacing:.09em; text-transform:uppercase; color:var(--light); margin-bottom:9px;}
  .kw-empty{font-size:12.5px; color:var(--light); padding:16px 0;}

  /* KPI */
  .kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  @media(max-width:560px){ .kpis{grid-template-columns:1fr;} }
  .kpi{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px 18px 16px;
    box-shadow:0 10px 26px rgba(40,50,40,.05); transition:transform .15s, box-shadow .15s;}
  .kpi:hover{transform:translateY(-3px); box-shadow:0 16px 32px rgba(40,50,40,.1);}
  .kpi .l{font-size:10.5px; color:var(--light); font-weight:700; letter-spacing:.06em; text-transform:uppercase;}
  .kpi .v{font-size:28px; font-weight:800; letter-spacing:-.03em; margin-top:8px; line-height:1;}
  .kpi .d{font-size:11.5px; font-weight:700; margin-top:8px;}
  .kpi .d.up{color:var(--good);} .kpi .d.down{color:var(--bad);} .kpi .d.flat{color:var(--light);}

  .work{white-space:pre-wrap; font-size:13.6px; color:#3a463f; line-height:1.72;}
  .mtag{display:inline-block; font-size:10.5px; font-weight:800; letter-spacing:.05em; color:var(--gold);
    background:var(--gold-s); padding:3px 10px; border-radius:7px; margin-bottom:9px;}

  .foot{text-align:center; color:var(--light); font-size:11.5px; margin-top:40px; line-height:1.9; letter-spacing:.02em;}
  .foot .fm{font-weight:800; color:var(--primary);} .foot .fm span{color:var(--green);}
  .load,.err{text-align:center; padding:100px 20px; color:var(--sub);}
  .err .t{font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap" id="wrap"><div class="load" id="load">리포트 불러오는 중…</div></div>

<script>
const SB='https://enqsuymbsugrkmstewek.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVucXN1eW1ic3Vncmttc3Rld2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDg1MzQsImV4cCI6MjA5ODQyNDUzNH0.LsVx4Eob26nBQ_sD_VjFoSXPgIQcTTaNSql48gdvgLM';
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const token=new URLSearchParams(location.search).get('t');
const fmtN=n=>Number(n||0).toLocaleString('ko-KR');
const mdShort=d=>{const p=d.split('-'); return `${+p[1]}.${+p[2]}`;};
const PALETTE=['#12805c','#c79a3a','#3a6ea5','#9a5b12','#2e7d57'];

function showErr(t,m){ document.getElementById('wrap').innerHTML=`<div class="err"><div class="t">${esc(t)}</div>${esc(m||'')}</div>`; }

async function load(){
  if(!token){ showErr('리포트를 열 수 없습니다','링크 주소를 다시 확인해주세요.'); return; }
  try{
    const res=await fetch(SB+'/rest/v1/rpc/place_report_public',{method:'POST',
      headers:{'apikey':ANON,'Authorization':'Bearer '+ANON,'Content-Type':'application/json'},
      body:JSON.stringify({p_token:token})});
    const data=await res.json();
    if(!res.ok || !data){ showErr('리포트를 찾을 수 없습니다','링크가 만료되었거나 잘못되었습니다.'); return; }
    render(data);
  }catch(e){ showErr('불러오기 오류', e.message); }
}

function groupByKeyword(ranks){
  const m={};
  ranks.forEach(r=>{ (m[r.keyword]=m[r.keyword]||[]).push(r); });
  Object.values(m).forEach(a=>a.sort((x,y)=>x.checked_on<y.checked_on?-1:1));
  return m;
}
const latestRank=s=>{ const p=s.filter(x=>x.rank!=null); return p.length?p[p.length-1].rank:null; };
function firstLast(s){ const p=s.filter(x=>x.rank!=null); return p.length<2?null:{first:p[0].rank,last:p[p.length-1].rank}; }

// 경쟁사 막대 (fuller = 상위). 최신 top_list 사용.
function topsBars(series){
  let latest=null;
  for(let i=series.length-1;i>=0;i--){ const tl=series[i].top_list; if(tl&&tl.length){ latest={date:series[i].checked_on,list:tl}; break; } }
  if(!latest) return '';
  const full=latest.list.slice().sort((a,b)=>(a.rank||0)-(b.rank||0));
  const ours=full.find(e=>e.ours);
  let list=full.slice(0,9);
  if(ours && !list.some(e=>e.ours)) list.push(ours);   // 우리 행은 TOP 밖이어도 항상 표시
  const maxR=Math.max(...list.map(e=>e.rank||1));
  const rows=list.map(e=>{
    const w=Math.max(8, Math.round(((maxR+1-(e.rank||maxR))/maxR)*100));
    const ours=!!e.ours;
    return `<div class="rbar${ours?' ours':''}">
      <span class="rno${e.rank<=3?' t':''} num">${e.rank}</span>
      <span class="rnm">${esc(e.name)}</span>
      <span class="rtk"><i style="width:${w}%"></i></span>
      ${ours?'<span class="tag">우리</span>':`<span class="rvl num">${e.rank}위</span>`}</div>`;
  }).join('');
  return `<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:13px;">
    <div class="rbar-cap">상위 노출 업체 · ${mdShort(latest.date)} 기준</div>${rows}</div>`;
}

function momTxt(cur,prev,cls){
  if(prev==null||prev===0) return '';
  const p=Math.round(((cur-prev)/prev)*100);
  if(p>0) return `<div class="${cls} up num">▲ +${p}% <span style="font-weight:600">전월</span></div>`;
  if(p<0) return `<div class="${cls} down num">▼ ${p}% <span style="font-weight:600">전월</span></div>`;
  return `<div class="${cls} flat">전월과 동일</div>`;
}

let chartRef=null;
function render(d){
  const p=d.place||{}, ranks=d.ranks||[], months=d.months||[];
  const groups=groupByKeyword(ranks);
  const kws=(p.target_keywords&&p.target_keywords.length? p.target_keywords.filter(k=>groups[k]) : Object.keys(groups));
  const allDates=[...new Set(ranks.map(r=>r.checked_on))].sort();
  const period=allDates.length?`${allDates[0].replace(/-/g,'.')} — ${allDates[allDates.length-1].replace(/-/g,'.')}`:'';

  // 요약 지표
  const latests=kws.map(k=>latestRank(groups[k])).filter(v=>v!=null);
  const avgRank=latests.length?(latests.reduce((a,b)=>a+b,0)/latests.length):null;
  let improved=0; kws.forEach(k=>{ const fl=firstLast(groups[k]); if(fl && fl.first-fl.last>0) improved++; });
  const lastM=months[months.length-1], prevM=months.length>1?months[months.length-2]:null;
  const vNow=(lastM&&lastM.stats||{}).views, vPrev=(prevM&&prevM.stats||{}).views;
  const vGrow=(vPrev)?Math.round(((vNow-vPrev)/vPrev)*100):null;

  let h='';
  h+=`<div class="topbar"><div class="brand">Blog<span>Studio</span></div>
      <div class="period">${period?('측정기간 '+period):''}</div></div>`;
  h+=`<div class="banner"><div class="eyebrow">Monthly Place Ranking Report</div>
      <h1>${esc(p.name||'')}</h1>
      <div class="meta">${[p.region,p.biztype].filter(Boolean).map(esc).map(x=>'<b>'+x+'</b>').join('  ·  ')}</div>
      <div class="chips">
        <div class="chip"><div class="v num">${avgRank!=null?avgRank.toFixed(1):'—'}<small>위</small></div><div class="l">타겟 키워드 평균 순위</div></div>
        <div class="chip"><div class="v num"><span class="gold">${improved}</span> / ${kws.length}</div><div class="l">순위 상승 키워드</div></div>
        <div class="chip"><div class="v num">${vGrow!=null?(vGrow>=0?'+':'')+vGrow+'%':'—'}</div><div class="l">플레이스 조회수 성장</div></div>
      </div></div>`;
  h+=`<div class="honest"><b>정직하게 알려드립니다.</b> 네이버 순위는 알고리즘과 경쟁 상황에 따라 늘 변동합니다.
      특정 순위를 보장하지 않으며, 실제 측정한 순위 추이와 유입 성장을 있는 그대로 보여드립니다.</div>`;

  // 순위 추이 (Chart.js)
  if(kws.length){
    h+=`<div class="sec"><h2>키워드 순위 추이</h2><div class="ln"></div><div class="agg">낮을수록 상위</div></div>`;
    h+=`<div class="panel"><div class="chartwrap"><canvas id="trend"></canvas></div></div>`;
  }

  // 키워드별 경쟁 현황
  h+=`<div class="sec"><h2>키워드별 경쟁 현황</h2><div class="ln"></div></div>`;
  if(!kws.length){ h+=`<div class="panel"><div class="kw-empty">아직 측정된 순위 데이터가 없습니다.</div></div>`; }
  else kws.forEach(kw=>{
    const s=groups[kw], nowR=latestRank(s), fl=firstLast(s);
    let dl=''; if(fl){ const diff=fl.first-fl.last;
      dl = diff>0?`<div class="dl up num">${fl.first}위 → ${diff}계단 상승</div>`
         : diff<0?`<div class="dl down num">${fl.first}위 → ${-diff}계단 하락</div>`
         : `<div class="dl flat">순위 유지</div>`; }
    const cur = nowR!=null?`<div class="big num">${nowR}<span class="u">위</span></div>`:`<div class="big out">순위권 밖</div>`;
    h+=`<div class="panel">
      <div class="kw-top">
        <div><div class="kw-name">${esc(kw)}</div><div class="kw-sub">네이버 통합검색</div></div>
        <div class="kw-cur">${cur}${dl}</div>
      </div>${topsBars(s)||'<div class="kw-empty">상위 업체 데이터가 아직 없습니다.</div>'}
    </div>`;
  });

  // 통계 KPI
  if(months.length){
    const st=lastM.stats||{}, pst=(prevM&&prevM.stats)||{};
    h+=`<div class="sec"><h2>스마트플레이스 통계</h2><div class="ln"></div><div class="agg">${esc(lastM.ym)}</div></div>`;
    h+=`<div class="kpis">
      <div class="kpi"><div class="l">플레이스 조회수</div><div class="v num">${fmtN(st.views)}</div>${momTxt(st.views,pst.views,'d')}</div>
      <div class="kpi"><div class="l">방문 유입</div><div class="v num">${fmtN(st.visits)}</div>${momTxt(st.visits,pst.visits,'d')}</div>
      <div class="kpi"><div class="l">예약·전화·길찾기</div><div class="v num">${fmtN(st.reserve_clicks)}</div>${momTxt(st.reserve_clicks,pst.reserve_clicks,'d')}</div>
    </div>`;
  }

  // 한 일
  const withWork=months.filter(m=>m.work_done&&m.work_done.trim());
  if(withWork.length){
    h+=`<div class="sec"><h2>이번 기간에 한 일</h2><div class="ln"></div></div>`;
    withWork.slice().reverse().forEach(m=>{ h+=`<div class="panel"><div class="mtag num">${esc(m.ym)}</div><div class="work">${esc(m.work_done)}</div></div>`; });
  }

  h+=`<div class="foot"><div class="fm">Blog<span>Studio</span></div>정직하게, 숫자로 증명하는 플레이스 관리<br>본 리포트는 실제 측정 데이터로 작성되었습니다.</div>`;

  document.getElementById('wrap').innerHTML=h;
  if(kws.length) drawTrend(kws, groups, allDates);
}

function drawTrend(kws, groups, dates){
  const ctx=document.getElementById('trend'); if(!ctx||!window.Chart) return;
  const datasets=kws.map((kw,i)=>{
    const c=PALETTE[i%PALETTE.length];
    const byDate={}; groups[kw].forEach(r=>byDate[r.checked_on]=r.rank);
    return { label:kw, data:dates.map(d=>byDate[d]==null?null:byDate[d]),
      borderColor:c, backgroundColor:c, tension:.35, borderWidth:2.6,
      pointRadius:3, pointHoverRadius:5, pointBackgroundColor:'#fff', pointBorderColor:c, pointBorderWidth:2,
      spanGaps:true };
  });
  chartRef=new Chart(ctx,{ type:'line',
    data:{ labels:dates.map(mdShort), datasets },
    options:{
      maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      layout:{padding:{top:8,right:8}},
      plugins:{
        legend:{position:'top', align:'start', labels:{boxWidth:9,boxHeight:9,usePointStyle:true,pointStyle:'circle',
          font:{family:"'Pretendard'",size:12,weight:'600'}, color:'#4b5a52', padding:16}},
        tooltip:{backgroundColor:'#123d2e', padding:11, cornerRadius:9, titleFont:{family:"'Pretendard'",size:12},
          bodyFont:{family:"'Pretendard'",size:12.5,weight:'600'}, displayColors:true, usePointStyle:true,
          callbacks:{ label:c=> ` ${c.dataset.label}: ${c.parsed.y==null?'순위밖':c.parsed.y+'위'}` }}
      },
      scales:{
        y:{ reverse:true, min:1, grid:{color:'#eceae1'}, border:{display:false},
          ticks:{stepSize:5, font:{family:"'Pretendard'",size:11}, color:'#9aa79e', callback:v=>v<1?'':v+'위', padding:8} },
        x:{ grid:{display:false}, border:{color:'#e5e1d6'},
          ticks:{font:{family:"'Pretendard'",size:11}, color:'#9aa79e', padding:6} }
      }
    }
  });
}
load();
</script>
</body>
</html>
