<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>월간 순위 리포트 · BlogStudio</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#f5f7f8; --card:#ffffff; --ink:#0f1720; --soft:#64748b; --faint:#94a3b8;
    --line:#eef1f4; --line2:#e6eaee;
    --green:#0f7a56; --green-d:#0b5c41; --tint:#eef6f2;
    --up:#0f9d63; --down:#d9583f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink);
    font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.6;
    font-feature-settings:"tnum" 1, "cv11" 1;}
  .num{font-variant-numeric:tabular-nums;}
  .wrap{max-width:820px; margin:0 auto; padding:30px 20px 80px;}

  /* 상단 워드마크 */
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
  .wordmark{font-size:14.5px; font-weight:800; letter-spacing:-.01em; color:var(--ink);}
  .wordmark span{color:var(--green);}
  .topbar .period{font-size:11.5px; color:var(--faint); letter-spacing:.04em; font-weight:600;}

  /* 히어로 (다크) */
  .hero{background:#0e1c17; color:#fff; border-radius:22px; padding:34px 32px 30px;
    position:relative; overflow:hidden;}
  .hero::after{content:""; position:absolute; right:-60px; top:-60px; width:220px; height:220px;
    background:radial-gradient(circle, rgba(15,122,86,.35), transparent 70%);}
  .eyebrow{font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
    color:#7fcdae; margin-bottom:14px;}
  .hero h1{font-size:30px; font-weight:800; letter-spacing:-.035em; line-height:1.15;}
  .hero .meta{margin-top:10px; font-size:13.5px; color:#a7b4ad; letter-spacing:.01em;}
  .hero .meta b{color:#d9e2dd; font-weight:600;}

  /* 정직 문구 */
  .honest{font-size:12.3px; color:var(--soft); line-height:1.6; padding:14px 2px 0;
    border-top:0; margin:16px 4px 0;}
  .honest b{color:var(--ink); font-weight:700;}

  /* 섹션 제목 */
  .sec{display:flex; align-items:baseline; gap:10px; margin:38px 4px 14px;}
  .sec h2{font-size:12px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--ink);}
  .sec .line{flex:1; height:1px; background:var(--line2);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 22px 16px;
    box-shadow:0 1px 2px rgba(15,23,32,.04); margin-bottom:12px;}

  /* 키워드 순위 카드 */
  .kw-top{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:2px;}
  .kw-name{font-size:15.5px; font-weight:700; letter-spacing:-.01em;}
  .kw-sub{font-size:11px; color:var(--faint); margin-top:2px; letter-spacing:.02em;}
  .kw-cur{text-align:right; white-space:nowrap;}
  .kw-cur .big{font-size:26px; font-weight:800; letter-spacing:-.03em; color:var(--ink);}
  .kw-cur .big .u{font-size:14px; font-weight:700; color:var(--soft); margin-left:1px;}
  .kw-cur .big.out{font-size:15px; color:var(--faint); font-weight:600;}
  .kw-delta{font-size:11.5px; font-weight:600; margin-top:3px; letter-spacing:.01em;}
  .kw-delta.up{color:var(--up);} .kw-delta.down{color:var(--down);} .kw-delta.flat{color:var(--faint);}
  .kw-delta .from{color:var(--faint); font-weight:500;}
  .chart{width:100%; height:auto; display:block; margin-top:10px;}
  .kw-empty{font-size:12.5px; color:var(--faint); padding:20px 0 8px;}

  /* 통계 */
  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  @media(max-width:560px){ .stat-grid{grid-template-columns:1fr;} }
  .stat{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px 18px 16px;}
  .stat .lab{font-size:10.5px; color:var(--faint); font-weight:700; letter-spacing:.08em; text-transform:uppercase;}
  .stat .val{font-size:29px; font-weight:800; letter-spacing:-.03em; margin-top:8px; line-height:1;}
  .stat .mom{font-size:11.5px; font-weight:700; margin-top:8px; letter-spacing:.01em;}
  .stat .mom.up{color:var(--up);} .stat .mom.down{color:var(--down);} .stat .mom.flat{color:var(--faint);}

  /* 한 일 */
  .work{white-space:pre-wrap; font-size:13.8px; color:#334155; line-height:1.72;}
  .month-tag{display:inline-block; font-size:10.5px; font-weight:800; letter-spacing:.06em; color:var(--green);
    background:var(--tint); padding:3px 10px; border-radius:6px; margin-bottom:10px;}

  .foot{text-align:center; color:var(--faint); font-size:11.5px; margin-top:44px; line-height:1.9;
    letter-spacing:.02em;}
  .foot .fm{font-weight:800; color:var(--ink);} .foot .fm span{color:var(--green);}
  .load,.err{text-align:center; padding:100px 20px; color:var(--soft); font-size:14px;}
  .err .t{font-size:16px; font-weight:700; color:var(--ink); margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="load" id="load">리포트 불러오는 중…</div>
</div>

<script>
const SB='https://enqsuymbsugrkmstewek.supabase.co';
const ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVucXN1eW1ic3Vncmttc3Rld2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDg1MzQsImV4cCI6MjA5ODQyNDUzNH0.LsVx4Eob26nBQ_sD_VjFoSXPgIQcTTaNSql48gdvgLM';
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const token=new URLSearchParams(location.search).get('t');
const fmtN=n=>Number(n||0).toLocaleString('ko-KR');
const mdShort=d=>{const p=d.split('-'); return `${+p[1]}.${+p[2]}`;};

function showErr(t,m){
  document.getElementById('wrap').innerHTML=`<div class="err"><div class="t">${esc(t)}</div>${esc(m||'')}</div>`;
}

async function load(){
  if(!token){ showErr('리포트를 열 수 없습니다','링크 주소를 다시 확인해주세요.'); return; }
  try{
    const res=await fetch(SB+'/rest/v1/rpc/place_report_public',{method:'POST',
      headers:{'apikey':ANON,'Authorization':'Bearer '+ANON,'Content-Type':'application/json'},
      body:JSON.stringify({p_token:token})});
    const data=await res.json();
    if(!res.ok || !data){ showErr('리포트를 찾을 수 없습니다','링크가 만료되었거나 잘못되었습니다.'); return; }
    render(data);
  }catch(e){ showErr('불러오기 오류', e.message); }
}

function groupByKeyword(ranks){
  const m={};
  ranks.forEach(r=>{ (m[r.keyword]=m[r.keyword]||[]).push(r); });
  Object.values(m).forEach(a=>a.sort((x,y)=>x.checked_on<y.checked_on?-1:1));
  return m;
}

// 순위 추이 차트 — 축·그리드·측정점 마커·값/날짜 라벨을 갖춘 애널리틱스 스타일.
// rank 낮을수록 상단(1위가 위). 비율 유지(preserveAspectRatio) → 라벨 왜곡 없음.
function rankChart(series, uid){
  const W=760, H=190;
  const padT=26, padB=30, padL=40, padR=16;   // 위=값라벨, 아래=날짜, 왼쪽=순위축
  const plotL=padL, plotR=W-padR, plotT=padT, plotB=H-padB;
  const plotW=plotR-plotL, plotH=plotB-plotT;
  const vals=series.filter(p=>p.rank!=null).map(p=>p.rank);
  if(vals.length===0) return '<div class="kw-empty">아직 측정 범위(순위권) 밖입니다. 노출을 끌어올리는 중입니다.</div>';

  let lo=Math.min(...vals), hi=Math.max(...vals);
  if(hi===lo){ hi=lo+3; lo=Math.max(1,lo-3); }
  const span=hi-lo, padv=Math.max(1, Math.round(span*0.28));
  let dmin=Math.max(1, lo-padv), dmax=hi+padv;          // 순위 도메인(상=dmin=좋음)
  const n=series.length;
  const X=i=> plotL + (n<=1? plotW/2 : (i/(n-1))*plotW);
  const Y=r=> plotT + ((r-dmin)/(dmax-dmin))*plotH;

  // Y축 눈금(순위) — 3~4개, 정수
  const ticks=[]; const T=3;
  for(let k=0;k<=T;k++){ const v=Math.round(dmin+(k/T)*(dmax-dmin)); if(!ticks.includes(v)) ticks.push(v); }
  let grid='', yl='';
  ticks.forEach(v=>{ const gy=Y(v).toFixed(1);
    grid+=`<line x1="${plotL}" y1="${gy}" x2="${plotR}" y2="${gy}" stroke="#eef2f4" stroke-width="1"/>`;
    yl+=`<text x="${plotL-9}" y="${(+gy+3.5)}" text-anchor="end" font-size="10.5" fill="#9aa6b2">${v}위</text>`;
  });

  // null 기준 연속 구간 분할
  const segs=[]; let cur=[];
  series.forEach((p,i)=>{ if(p.rank==null){ if(cur.length)segs.push(cur); cur=[]; }
    else cur.push({x:X(i), y:Y(p.rank), r:p.rank, i}); });
  if(cur.length) segs.push(cur);

  let area='', line='';
  segs.forEach(seg=>{
    if(seg.length<2) return;
    const d='M '+seg.map(p=>`${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' L ');
    area+=`<path d="${d} L ${seg[seg.length-1].x.toFixed(1)} ${plotB} L ${seg[0].x.toFixed(1)} ${plotB} Z" fill="url(#g${uid})"/>`;
    line+=`<path d="${d}" fill="none" stroke="#0f7a56" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`;
  });

  // 측정점 마커 + 값 라벨 + 날짜 라벨
  let dots='', vlab='', xlab='';
  const showEvery = n>8 ? 2 : 1;   // 점이 많으면 날짜/값 라벨 솎아냄
  series.forEach((p,i)=>{
    const px=X(i);
    // 날짜 라벨(솎기, 처음·끝은 항상)
    if(i%showEvery===0 || i===n-1){
      const anc = i===0?'start':(i===n-1?'end':'middle');
      xlab+=`<text x="${px.toFixed(1)}" y="${H-11}" text-anchor="${anc}" font-size="10" fill="#9aa6b2">${mdShort(p.checked_on)}</text>`;
    }
    if(p.rank==null) return;
    const py=Y(p.rank), last=i===n-1;
    dots+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${last?4.4:3}" fill="#fff" stroke="#0f7a56" stroke-width="${last?2.4:2}"/>`;
    if(i%showEvery===0 || last){
      const anc = i===0?'start':(i===n-1?'end':'middle');
      vlab+=`<text x="${px.toFixed(1)}" y="${(py-9).toFixed(1)}" text-anchor="${anc}" font-size="11" font-weight="${last?800:700}" fill="${last?'#0b5c41':'#334155'}">${p.rank}</text>`;
    }
  });

  return `<svg class="chart" viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f7a56" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0f7a56" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}${yl}${area}${line}${dots}${vlab}${xlab}</svg>`;
}

function deltaLine(series){
  const pts=series.filter(p=>p.rank!=null);
  if(pts.length<2) return '';
  const first=pts[0].rank, last=pts[pts.length-1].rank, diff=first-last;
  if(diff>0) return `<div class="kw-delta up"><span class="from num">${first}위</span> → <b class="num">${diff}계단 상승</b></div>`;
  if(diff<0) return `<div class="kw-delta down"><span class="from num">${first}위</span> → <b class="num">${-diff}계단 하락</b></div>`;
  return `<div class="kw-delta flat">순위 유지</div>`;
}

function momBadge(cur,prev){
  if(prev==null||prev===0) return '';
  const p=Math.round(((cur-prev)/prev)*100);
  if(p>0) return `<div class="mom up num">+${p}% <span style="font-weight:600;letter-spacing:0">전월 대비</span></div>`;
  if(p<0) return `<div class="mom down num">${p}% <span style="font-weight:600;letter-spacing:0">전월 대비</span></div>`;
  return `<div class="mom flat">전월과 동일</div>`;
}

function render(d){
  const p=d.place||{}, ranks=d.ranks||[], months=d.months||[];
  const groups=groupByKeyword(ranks);
  const allDates=[...new Set(ranks.map(r=>r.checked_on))].sort();
  const period = allDates.length? `${allDates[0].replace(/-/g,'.')} — ${allDates[allDates.length-1].replace(/-/g,'.')}` : '';

  let h='';
  h+=`<div class="topbar"><div class="wordmark">Blog<span>Studio</span></div>
      <div class="period">${period?('측정기간 '+period):''}</div></div>`;
  h+=`<div class="hero"><div class="eyebrow">Monthly Place Ranking Report</div>
      <h1>${esc(p.name||'')}</h1>
      <div class="meta">${[p.region,p.biztype].filter(Boolean).map(esc).map(x=>'<b>'+x+'</b>').join('  ·  ')||''}</div></div>`;
  h+=`<div class="honest"><b>정직하게 알려드립니다.</b> 네이버 순위는 알고리즘과 경쟁 상황에 따라 늘 변동합니다.
      특정 순위를 보장하지 않으며, 실제 측정한 <b>순위 추이</b>와 <b>유입 성장</b>을 있는 그대로 보여드립니다.</div>`;

  // 키워드 순위
  const kws=(p.target_keywords&&p.target_keywords.length? p.target_keywords : Object.keys(groups));
  h+=`<div class="sec"><h2>타겟 키워드 순위 추이</h2><div class="line"></div></div>`;
  if(Object.keys(groups).length===0){
    h+=`<div class="card"><div class="kw-empty">아직 측정된 순위 데이터가 없습니다.</div></div>`;
  } else {
    let idx=0;
    kws.forEach(kw=>{
      const s=groups[kw]; if(!s) return; idx++;
      const pts=s.filter(x=>x.rank!=null);
      const nowR=pts.length? pts[pts.length-1].rank : null;
      const curHtml = nowR!=null
        ? `<div class="big num">${nowR}<span class="u">위</span></div>`
        : `<div class="big out">순위권 밖</div>`;
      h+=`<div class="card">
        <div class="kw-top">
          <div><div class="kw-name">${esc(kw)}</div><div class="kw-sub">네이버 통합검색</div></div>
          <div class="kw-cur">${curHtml}${deltaLine(s)}</div>
        </div>
        ${rankChart(s, idx)}
      </div>`;
    });
  }

  // 통계
  if(months.length){
    const last=months[months.length-1], prev=months.length>1?months[months.length-2]:null;
    const st=last.stats||{}, pst=(prev&&prev.stats)||{};
    h+=`<div class="sec"><h2>스마트플레이스 통계 · ${esc(last.ym)}</h2><div class="line"></div></div>`;
    h+=`<div class="stat-grid">
      <div class="stat"><div class="lab">플레이스 조회수</div><div class="val num">${fmtN(st.views)}</div>${momBadge(st.views,pst.views)}</div>
      <div class="stat"><div class="lab">방문 유입</div><div class="val num">${fmtN(st.visits)}</div>${momBadge(st.visits,pst.visits)}</div>
      <div class="stat"><div class="lab">예약·전화·길찾기</div><div class="val num">${fmtN(st.reserve_clicks)}</div>${momBadge(st.reserve_clicks,pst.reserve_clicks)}</div>
    </div>`;
  }

  // 한 일
  const withWork=months.filter(m=>m.work_done && m.work_done.trim());
  if(withWork.length){
    h+=`<div class="sec"><h2>이번 기간에 한 일</h2><div class="line"></div></div>`;
    withWork.slice().reverse().forEach(m=>{
      h+=`<div class="card"><div class="month-tag num">${esc(m.ym)}</div><div class="work">${esc(m.work_done)}</div></div>`;
    });
  }

  h+=`<div class="foot"><div class="fm">Blog<span>Studio</span></div>정직하게, 숫자로 증명하는 플레이스 관리<br>본 리포트는 실제 측정 데이터로 작성되었습니다.</div>`;

  document.getElementById('wrap').innerHTML=h;
}
load();
</script>
</body>
</html>
