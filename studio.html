<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlogStudio 스튜디오 — AI 원고·플레이스 관리</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --bg:#f6f8f9; --card:#fff; --ink:#111827; --soft:#6b7280; --line:#e5e7eb;
    --green:#12805c; --green2:#0e6a4c; --tint:#e8f6f0; }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.6;}
  .app{display:grid; grid-template-columns:230px 1fr; min-height:100vh;}

  /* 사이드바 */
  .side{background:var(--card); border-right:1px solid var(--line); padding:18px 12px; overflow-y:auto;}
  .brand{font-size:18px; font-weight:800; padding:6px 10px 16px; letter-spacing:-.02em;}
  .brand span{color:var(--green);}
  .cat{font-size:11px; font-weight:800; color:var(--soft); letter-spacing:.06em; text-transform:uppercase; margin:16px 10px 6px;}
  .tool{display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:9px; font-size:14px;
    color:var(--ink); cursor:pointer; transition:.12s; position:relative;}
  .tool:hover{background:var(--tint);}
  .tool.on{background:var(--green); color:#fff; font-weight:700;}
  .tool .ic{width:18px; text-align:center;}
  .tool .soon{position:absolute; right:8px; font-size:9px; font-weight:700; color:#d97706; background:#fffbeb;
    padding:1px 6px; border-radius:10px;}
  .tool.on .soon{display:none;}
  .tool.new .ic{filter:none;}
  .tag-new{font-size:9px; font-weight:800; color:var(--green); background:var(--tint); padding:1px 6px; border-radius:10px; margin-left:auto;}
  .tool.on .tag-new{background:rgba(255,255,255,.25); color:#fff;}

  /* 메인 */
  .main{padding:28px 32px 60px; overflow-y:auto; max-width:1100px;}
  .head h1{font-size:24px; font-weight:800; letter-spacing:-.02em;}
  .head p{color:var(--soft); margin-top:6px; font-size:14.5px;}
  .diff{display:inline-block; margin-top:10px; font-size:12.5px; font-weight:700; color:var(--green);
    background:var(--tint); padding:5px 12px; border-radius:20px;}

  .work{display:grid; grid-template-columns:380px 1fr; gap:24px; margin-top:24px; align-items:start;}
  @media(max-width:900px){ .work{grid-template-columns:1fr;} }
  .panel{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px;
    box-shadow:0 1px 3px rgba(17,24,39,.04);}
  .panel h3{font-size:15px; font-weight:800; margin-bottom:4px;}
  .panel .sub{font-size:12.5px; color:var(--soft); margin-bottom:16px;}
  label{display:block; font-size:12.5px; font-weight:700; margin:14px 0 6px;}
  input,textarea{width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 12px;
    font-size:14px; font-family:inherit; outline:none; transition:.15s;}
  input:focus,textarea:focus{border-color:var(--green); box-shadow:0 0 0 3px var(--tint);}
  textarea{resize:vertical; min-height:60px;}
  .gen{width:100%; margin-top:18px; background:var(--green); color:#fff; border:none; border-radius:11px;
    padding:13px; font-size:15px; font-weight:700; cursor:pointer; transition:.15s;}
  .gen:hover{background:var(--green2);} .gen:disabled{background:#cbd5d1; cursor:not-allowed;}

  /* 결과 (네이버 미리보기) */
  .result{background:var(--card); border:1px solid var(--line); border-radius:16px; min-height:300px;
    box-shadow:0 1px 3px rgba(17,24,39,.04); overflow:hidden;}
  .rbar{display:flex; align-items:center; justify-content:space-between; padding:12px 18px; border-bottom:1px solid var(--line);}
  .rbar .t{font-size:13px; font-weight:700; color:var(--soft);}
  .rbar .act{display:flex; gap:8px;}
  .rbar button{border:1px solid var(--line); background:#fff; border-radius:8px; padding:6px 12px;
    font-size:12.5px; font-weight:700; cursor:pointer;}
  .rbar button:hover{border-color:var(--green); color:var(--green);}
  .rbody{padding:24px 22px 40px; max-width:640px; margin:0 auto;}
  .rbody h2{font-size:20px; font-weight:800; margin-bottom:18px; line-height:1.4;}
  .rbody .sh{font-size:15.5px; font-weight:800; color:var(--green); margin:22px 0 10px;}
  .rbody p{font-size:15px; margin:0 0 16px; color:#333;}
  .imgph{background:#f4f6f5; border:1px dashed #c9d3ce; border-radius:10px; padding:30px 10px;
    text-align:center; color:#7a8a83; font-size:12.5px; margin:0 0 18px;}
  .tags{margin-top:20px; padding-top:16px; border-top:1px solid var(--line);}
  .tags span{display:inline-block; color:var(--green); font-size:13px; margin:0 8px 6px 0; font-weight:600;}
  .empty{padding:70px 20px; text-align:center; color:#9ca3af; font-size:14px;}
  .empty .big{font-size:34px; margin-bottom:12px;}
  .spin{display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; margin-right:6px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .kpchip{display:inline-block; margin:0 6px 6px 0; padding:5px 11px; font-size:12.5px; font-weight:600;
    color:var(--green); background:#eef7f2; border:1px solid #cfe6da; border-radius:99px; cursor:pointer;}
  .kpchip:hover{background:#dff0e7;}
  .kpchip small{color:#8aa094; font-weight:500;}

  /* 로그인 게이트 + 사이드바 유저박스 */
  .gate{position:fixed; inset:0; background:var(--bg); display:none; align-items:center;
    justify-content:center; z-index:100; padding:24px;}
  .gate.show{display:flex;}
  .gate-box{max-width:360px; width:100%; text-align:center; background:var(--card);
    border:1px solid var(--line); border-radius:16px; padding:36px 28px;
    box-shadow:0 8px 30px rgba(17,24,39,.06);}
  .gate-box .gbrand{font-size:26px; font-weight:800; letter-spacing:-.02em;}
  .gate-box .gbrand span{color:var(--green);}
  .gate-box p{color:var(--soft); margin:10px 0 26px; font-size:14.5px;}
  .kbtn{display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
    padding:14px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer;
    border:1px solid #FEE500; background:#FEE500; color:#191600; transition:.15s;}
  .kbtn:hover{background:#f5dc00;}
  .kbtn svg{width:18px; height:18px;}
  .gate-box .free{margin-top:18px; font-size:13px; color:var(--soft); font-weight:600;}
  .userbox{margin:4px 10px 8px; padding:10px 12px; background:var(--tint); border-radius:10px;
    display:flex; align-items:center; justify-content:space-between; font-size:12.5px;}
  .userbox .pts{font-weight:800; color:var(--green); font-size:14px;}
  .userbox .out{color:var(--soft); cursor:pointer; font-size:11.5px;}
  .userbox .out:hover{color:var(--ink); text-decoration:underline;}
</style>
</head>
<body>

<!-- 로그인 게이트 (비로그인 시) -->
<div class="gate" id="loginGate">
  <div class="gate-box">
    <div class="gbrand">Blog<span>Studio</span> 스튜디오</div>
    <p>카카오로 로그인하면 AI 원고·플레이스 관리 툴을<br>바로 쓸 수 있어요. (생성 1건 = 1P)</p>
    <button class="kbtn" onclick="loginKakao()">
      <svg viewBox="0 0 24 24" fill="#191600"><path d="M12 3C6.5 3 2 6.5 2 10.8c0 2.8 1.9 5.2 4.7 6.6-.2.7-.7 2.6-.8 3-.1.5.2.5.4.4.2-.1 2.6-1.8 3.7-2.5.7.1 1.4.2 2 .2 5.5 0 10-3.5 10-7.8S17.5 3 12 3z"/></svg>
      카카오로 로그인
    </button>
    <div class="free">가입 시 무료 30P — 글 30건 생성 가능</div>
  </div>
</div>

<div class="app">
  <!-- 사이드바: 가제트식 툴 라이브러리 -->
  <aside class="side">
    <div class="brand">Blog<span>Studio</span> 스튜디오</div>
    <div class="userbox" id="userBox" style="display:none;">
      <span class="pts" id="ptsView">-P</span>
      <span class="out" onclick="logout()">로그아웃</span>
    </div>
    <div id="toolList"></div>
  </aside>

  <!-- 메인 작업 영역 -->
  <main class="main">
    <div class="head">
      <h1 id="hTitle">플레이스 최적화 리뷰</h1>
      <p id="hDesc">업체 정보만 넣으면 네이버 플레이스 상위노출용 정보성 글을 만들어요.</p>
      <div class="diff">⭐ 가제트 차별점: 뜬구름 아닌 <b>실제 정보(수치·항목)</b>가 든 글</div>
    </div>

    <div class="work">
      <div class="panel">
        <h3 id="pTitle">입력</h3>
        <div class="sub" id="pSub">필요한 것만 채우세요. 나머진 AI가 알아서.</div>
        <div id="fields"></div>
        <button class="gen" id="genBtn" onclick="generate()">✨ 글 생성 (1P)</button>
      </div>

      <div class="result">
        <div class="rbar">
          <span class="t">📄 미리보기 (네이버 스타일)</span>
          <div class="act">
            <button onclick="copyBody()">본문 복사</button>
          </div>
        </div>
        <div id="rContent">
          <div class="empty"><div class="big">✍️</div>왼쪽에서 입력하고 <b>글 생성</b>을 눌러보세요</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const SB_URL='https://enqsuymbsugrkmstewek.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVucXN1eW1ic3Vncmttc3Rld2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDg1MzQsImV4cCI6MjA5ODQyNDUzNH0.LsVx4Eob26nBQ_sD_VjFoSXPgIQcTTaNSql48gdvgLM';

// ===== 로그인/포인트 (생성 1건 = 1P, 서버(엣지함수)가 차감) =====
const KAKAO_REST='dc1eb4bc3a63df77105977a17597a0d0';
const sb = supabase.createClient(SB_URL, SB_ANON);
// 카카오 redirect URI엔 order.html만 등록돼 있음 → order.html이 로그인 마무리 후
// bs_back(sessionStorage)을 보고 여기로 돌려보냄
const ORDER_URL = location.origin + location.pathname.replace(/studio\.html$/i, 'order.html');
function loginKakao(){
  sessionStorage.setItem('bs_back', 'studio.html');
  location.href = 'https://kauth.kakao.com/oauth/authorize?response_type=code'
    + '&client_id=' + KAKAO_REST
    + '&redirect_uri=' + encodeURIComponent(ORDER_URL);
}
async function logout(){ await sb.auth.signOut(); location.reload(); }
function setPts(v){ document.getElementById('ptsView').textContent = (v==null?'-':v)+'P'; }
function showGate(on){ document.getElementById('loginGate').classList.toggle('show', !!on); }
async function bootAuth(){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ showGate(true); return; }
  showGate(false);
  document.getElementById('userBox').style.display='flex';
  const { data } = await sb.from('profiles').select('point_balance').eq('id', session.user.id).single();
  setPts(data?.point_balance ?? 0);
}

  { id:'ai_image', cat:'이미지', ic:'🖼️', name:'AI 이미지 생성', soon:true },
  { id:'image_edit', cat:'이미지', ic:'✂️', name:'이미지 편집', soon:true },

  // ── 발행·리포트 (우리만, 준비중) ──
  { id:'publish', cat:'⭐ 발행·리포트', ic:'🚀', name:'네이버 발행', ours:true, soon:true },
  { id:'rank_report', cat:'⭐ 발행·리포트', ic:'📊', name:'순위 리포트', ours:true, soon:true },
  { id:'bulk', cat:'⭐ 발행·리포트', ic:'📦', name:'대량 생성', soon:true },
];

let cur = TOOLS[0];
function renderTools(){
  const list = document.getElementById('toolList');
  const cats = [];
  TOOLS.forEach(t=>{ if(!cats.includes(t.cat)) cats.push(t.cat); });
  list.innerHTML = cats.map(cat=>{
    const items = TOOLS.filter(t=>t.cat===cat).map(t=>
      `<div class="tool ${t.id===cur.id?'on':''}" onclick="${t.soon?'':`selectTool('${t.id}')`}" ${t.soon?'data-soon':''}>
        <span class="ic">${t.ic}</span> ${t.name}
        ${t.soon?'<span class="soon">준비중</span>':(t.flag?'<span class="tag-new">추천</span>':(t.ours?'<span class="tag-new">우리만</span>':''))}
      </div>`).join('');
    return `<div class="cat">${cat}</div>${items}`;
  }).join('');
}
function selectTool(id){
  cur = TOOLS.find(t=>t.id===id);
  document.getElementById('hTitle').textContent = cur.name;
  document.getElementById('hDesc').textContent = cur.desc;
  const kw = cur.kind==='keyword';
  document.getElementById('genBtn').textContent = kw ? '🔍 검색량 조회' : '✨ 글 생성 (1P)';
  renderTools(); renderFields();
  document.getElementById('rContent').innerHTML='<div class="empty"><div class="big">'+(kw?'🔍':'✍️')+'</div>왼쪽에서 입력하고 <b>'+(kw?'검색량 조회':'글 생성')+'</b>를 눌러보세요</div>';
}
function renderFields(){
  document.getElementById('fields').innerHTML = (cur.fields||[]).map(f=>
    `<label>${f.l}</label>${f.big?`<textarea id="f_${f.k}" placeholder="${f.ph}"></textarea>`:`<input id="f_${f.k}" placeholder="${f.ph}">`}`
    + (f.k==='target_keyword' ? `<div id="kpChips" style="display:none;margin:-4px 0 10px"></div>` : '')
  ).join('');
  // 토큰을 붙여넣으면 keyword-plan 추천 칩 표시 (target_keyword 필드가 있는 툴만)
  const tokEl=document.getElementById('f_place_token'), tgtEl=document.getElementById('f_target_keyword');
  if(tokEl && tgtEl) tokEl.addEventListener('change', ()=>loadKwChips(tokEl.value));
}
async function loadKwChips(raw){
  const box=document.getElementById('kpChips'); if(!box) return;
  const m=(raw||'').match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
  if(!m){ box.style.display='none'; return; }
  box.style.display='block';
  box.innerHTML='<span style="font-size:12px;color:#98a49e">추천 키워드 불러오는 중…</span>';
  try{
    const r=await fetch(SB_URL+'/functions/v1/keyword-plan',{method:'POST',
      headers:{'Authorization':'Bearer '+SB_ANON,'Content-Type':'application/json'},
      body:JSON.stringify({place_token:m[0]})});
    const j=await r.json();
    if(!r.ok || !j.plan){ box.style.display='none'; return; }
    const chips=[j.plan.head, ...(j.plan.subs||[])].filter(Boolean).slice(0,9);
    box.innerHTML='<div style="font-size:12px;color:#5b6a62;margin-bottom:6px">🎯 실측 기반 추천 — 누르면 타겟 키워드로 들어가요 (월 검색량)</div>'
      + chips.map(c=>`<button type="button" class="kpchip" onclick="document.getElementById('f_target_keyword').value='${esc(c.keyword)}'">${esc(c.keyword)} <small>${Number(c.volume||0).toLocaleString()}</small></button>`).join('');
  }catch(_){ box.style.display='none'; }
}

async function generate(){
  const fields = {};
  cur.fields.forEach(f=> fields[f.k] = (document.getElementById('f_'+f.k).value||'').trim());
  // 진단 데이터 토큰: URL을 통째로 붙여도 uuid만 추출
  let placeToken = null;
  if(fields.place_token){
    const m = fields.place_token.match(/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i);
    if(!m){ alert('진단 데이터 토큰 형식이 아니에요. 리포트 링크(t=...) 또는 토큰을 붙여넣으세요.'); return; }
    placeToken = m[0];
  }
  delete fields.place_token;
  // 필수 필드 검증 (토큰 연결 시 업체정보는 서버가 자동 채움)
  const AUTO = ['name','region','biztype','keywords'];
  const labelOf = k => (cur.fields.find(f=>f.k===k)||{}).l || k;
  for(const rk of (cur.req||[])){
    if(placeToken && AUTO.includes(rk)) continue;
    if(!fields[rk]){ alert('"'+labelOf(rk)+'" 항목을 넣어주세요.'); return; }
  }

  if(cur.kind==='keyword'){ return runKeyword(fields); }

  // 로그인 세션 필수 (서버가 1P 차감)
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ showGate(true); return; }

  const btn=document.getElementById('genBtn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>생성 중… (약 10초)';
  try{
    const res = await fetch(GEN_URL,{ method:'POST',
      headers:{'Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'},
      body: JSON.stringify({ tool: cur.id, fields, place_token: placeToken }) });
    const j = await res.json();
    if(j && j.balance != null) setPts(j.balance);
    if(res.status===401){ showGate(true); }
    else if(res.status===402){
      if(confirm('포인트가 부족합니다.\n주문 페이지에서 충전 신청을 하시겠어요?')) location.href='order.html';
    }
    else if(!res.ok) throw new Error(j.error||'생성 실패');
    else renderResult(j);
  }catch(e){ alert('오류: '+e.message); }
  btn.disabled=false; btn.textContent='✨ 글 생성 (1P)';
}

let lastBody='';
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderResult(j){
  lastBody = [j.title, j.body, j.tags].filter(x=>x&&x.trim()).join('\n\n');
  let html = '';
  if(j.brief){
    html += `<div style="margin:16px 18px 0;background:#e8f6f0;border:1px solid #bfe3d5;border-radius:12px;padding:14px 16px;">
      <div style="font-size:12.5px;font-weight:800;color:#12805c;margin-bottom:6px;">📊 이 실측 데이터가 반영됐어요 (네이버 진단)</div>
      <div style="font-size:12px;color:#374151;line-height:1.7;white-space:pre-line;">${esc(j.brief.replace(/^\[.*?\]\n/,''))}</div>
    </div>`;
  }
  html += `<div class="rbody">${j.title&&j.title.trim()?`<h2>${esc(j.title)}</h2>`:''}`;
  const paras = (j.body||'').split(/\n\s*\n/);
  for(let p of paras){
    p=p.trim(); if(!p) continue;
    if(p==='[이미지]'){ html+='<div class="imgph">🖼️ 이미지 자리 (Gemini 생성 + 자동배치)</div>'; continue; }
    // **소제목** → 강조 헤딩
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if(m){ html+=`<div class="sh">${esc(m[1])}</div>`; continue; }
    // 소제목이 문단 첫줄에 붙은 경우 처리
    p = p.replace(/\*\*(.+?)\*\*/g, '');
    const lines = p.split('\n').map(l=>esc(l.trim())).filter(Boolean);
    if(lines.length) html+=`<p>${lines.join('<br>')}</p>`;
  }
  if(j.tags){ html+='<div class="tags">'+j.tags.split(/\s+/).map(t=>`<span>${esc(t)}</span>`).join('')+'</div>'; }
  html+='</div>';
  document.getElementById('rContent').innerHTML = html;
}
function copyBody(){ if(!lastBody){alert('먼저 생성하세요.');return;} navigator.clipboard.writeText(lastBody); alert('복사됨!'); }

// ── 키워드 검색량 (네이버 검색광고 API) ──
async function runKeyword(fields){
  const kws = (fields.keywords||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,5);
  if(!kws.length){ alert('키워드를 넣어주세요.'); return; }
  const btn=document.getElementById('genBtn'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>조회 중…';
  try{
    const res=await fetch(KW_URL,{ method:'POST',
      headers:{'Authorization':'Bearer '+SB_ANON,'Content-Type':'application/json'},
      body:JSON.stringify({ keywords:kws }) });
    const j=await res.json();
    if(!res.ok) throw new Error(j.error||'조회 실패');
    renderKeywordResult(j);
  }catch(e){ alert('오류: '+e.message); }
  btn.disabled=false; btn.textContent='🔍 검색량 조회';
}
function compBadge(c){
  const map={'낮음':'#16a34a','중간':'#d97706','높음':'#dc2626'};
  const col=map[c]||'#6b7280';
  return `<span style="font-size:11px;font-weight:700;color:${col};background:${col}1a;padding:2px 8px;border-radius:20px;">${esc(c||'-')}</span>`;
}
function renderKeywordResult(j){
  const req=j.requested||[], rel=j.related||[];
  lastBody = req.map(r=>`${r.keyword}\t월 ${r.total==null?'-':r.total}회 (경쟁 ${r.comp||'-'})`).join('\n');
  let html='<div style="padding:20px 22px 30px;">';
  html+='<div style="font-size:13px;font-weight:800;color:#12805c;margin-bottom:10px;">📊 월간 검색량 (PC+모바일)</div>';
  html+='<table style="width:100%;border-collapse:collapse;font-size:13.5px;">'
      +'<tr style="color:#6b7280;font-size:11.5px;text-align:left;border-bottom:1px solid #e5e7eb;">'
      +'<th style="padding:8px 4px;">키워드</th><th style="text-align:right;">월 검색량</th><th style="text-align:right;">PC</th><th style="text-align:right;">모바일</th><th style="text-align:center;">경쟁</th></tr>';
  for(const r of req){
    html+='<tr style="border-bottom:1px solid #f1f3f5;">'
      +'<td style="padding:10px 4px;font-weight:700;">'+esc(r.keyword)+'</td>'
      +'<td style="text-align:right;font-weight:800;color:#111827;font-variant-numeric:tabular-nums;">'+fmtNum(r.total)+'</td>'
      +'<td style="text-align:right;color:#6b7280;font-variant-numeric:tabular-nums;">'+fmtNum(r.pc)+'</td>'
      +'<td style="text-align:right;color:#6b7280;font-variant-numeric:tabular-nums;">'+fmtNum(r.mobile)+'</td>'
      +'<td style="text-align:center;">'+compBadge(r.comp)+'</td></tr>';
  }
  html+='</table>';
  if(rel.length){
    html+='<div style="font-size:13px;font-weight:800;color:#12805c;margin:22px 0 10px;">🔎 관련 추천 키워드 <span style="font-weight:500;color:#9ca3af;font-size:11.5px;">검색량 순</span></div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:8px;">';
    for(const r of rel){
      html+='<div style="border:1px solid #e5e7eb;border-radius:10px;padding:8px 12px;font-size:13px;">'
        +'<b>'+esc(r.keyword)+'</b> <span style="color:#12805c;font-weight:700;font-variant-numeric:tabular-nums;">'+fmtNum(r.total)+'</span> '
        +compBadge(r.comp)+'</div>';
    }
    html+='</div>';
  }
  html+='<div style="margin-top:20px;font-size:11.5px;color:#9ca3af;">출처: 네이버 검색광고 · 최근 30일 조회수 기준</div>';
  html+='</div>';
  document.getElementById('rContent').innerHTML=html;
}

renderTools(); renderFields(); bootAuth();
</script>
